<meta name="apple-mobile-web-app-capable" content="yes">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0f;--s1:#111118;--s2:#18181f;--s3:#1e1e28;
  --border:#2a2a3a;--gold:#c9a84c;--gold2:#e8c76a;
  --glow:rgba(201,168,76,0.12);--green:#22c55e;--red:#ef4444;
  --orange:#f97316;--text:#e8e8f0;--text2:#9898b0;--text3:#55556a;
  --r:12px;--rl:18px;
}
html,body{height:100%;overflow:hidden;font-family:'Segoe UI',system-ui,sans-serif;
  background:var(--bg);color:var(--text);font-size:15px}

/* ── SPLASH ── */
#splash{position:fixed;inset:0;background:radial-gradient(ellipse at 50% 25%,rgba(201,168,76,0.07),transparent 60%),var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;z-index:999}
.sp-logo{width:88px;height:88px;border-radius:50%;background:linear-gradient(135deg,#1c1c26,#252518);
  border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;font-size:36px;
  box-shadow:0 0 40px rgba(201,168,76,0.25);animation:glow 2.5s ease-in-out infinite}
@keyframes glow{0%,100%{box-shadow:0 0 30px rgba(201,168,76,0.2)}50%{box-shadow:0 0 60px rgba(201,168,76,0.45)}}
.sp-title{font-size:30px;font-weight:800;letter-spacing:3px;color:var(--gold)}
.sp-sub{font-size:13px;color:var(--text2);text-align:center;max-width:300px;line-height:1.7;letter-spacing:.3px}
.sp-status{display:flex;align-items:center;gap:8px;padding:6px 16px;border-radius:20px;
  background:var(--s2);border:1px solid var(--border);font-size:12px;color:var(--text2)}
.sp-dot{width:8px;height:8px;border-radius:50%;background:var(--text3);transition:all .4s}
.sp-dot.on{background:var(--green);box-shadow:0 0 8px rgba(34,197,94,.5)}
.sp-dot.err{background:var(--orange)}
#sp-txt{transition:color .4s}
.sp-btn{margin-top:8px;padding:13px 46px;background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:#0a0a0f;font-size:15px;font-weight:700;letter-spacing:.8px;border:none;border-radius:50px;
  cursor:pointer;box-shadow:0 4px 20px rgba(201,168,76,.35);transition:all .2s}
.sp-btn:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(201,168,76,.5)}

/* ── APP ── */
#app{height:100vh;flex-direction:column;display:none}

/* TOPBAR */
#topbar{flex-shrink:0;background:var(--s1);border-bottom:1px solid var(--border);
  height:52px;display:flex;align-items:center;padding:0 16px;gap:12px;position:relative;z-index:10}
.top-brand{font-size:18px;font-weight:800;color:var(--gold);letter-spacing:2px;flex:1}
.top-brand small{display:block;font-size:10px;color:var(--text3);font-weight:400;letter-spacing:1px;margin-top:-1px}
#ia-pill{display:flex;align-items:center;gap:7px;padding:5px 14px;border-radius:20px;
  background:var(--s2);border:1px solid var(--border);font-size:12px;cursor:pointer;
  transition:all .2s;user-select:none}
#ia-pill:hover{border-color:var(--gold);background:var(--glow)}
#ia-dot{width:7px;height:7px;border-radius:50%;background:var(--text3);transition:background .3s}
#ia-dot.on{background:var(--green);box-shadow:0 0 7px rgba(34,197,94,.5)}
#ia-lbl{color:var(--text2);font-size:12px;transition:color .3s}
#ia-lbl.on{color:var(--green)}

/* ERRO BANNER */
#err-banner{display:none;background:rgba(239,68,68,.1);border-bottom:1px solid rgba(239,68,68,.25);
  padding:7px 16px;font-size:12px;color:var(--red);text-align:center;flex-shrink:0}

/* CORPO */
#body{flex:1;display:flex;overflow:hidden}

/* SIDEBAR */
#sidebar{width:240px;background:var(--s1);border-right:1px solid var(--border);
  display:flex;flex-direction:column;padding:14px 10px;gap:10px;flex-shrink:0;overflow-y:auto}
@media(max-width:680px){#sidebar{display:none}}
.sb-profile{background:var(--s2);border:1px solid var(--border);border-radius:var(--r);
  padding:14px;display:flex;flex-direction:column;align-items:center;gap:7px}
.sb-av{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,#252518,#1c1c26);
  border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;font-size:20px;
  font-weight:700;color:var(--gold)}
.sb-nome{font-size:13px;font-weight:600}
.sb-role{font-size:11px;color:var(--text3)}
.sb-sec{font-size:10px;color:var(--text3);font-weight:700;letter-spacing:1px;padding:4px 4px 0}
.sb-item{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:var(--r);
  font-size:13px;color:var(--text2);cursor:pointer;transition:all .15s}
.sb-item:hover{background:var(--s2);color:var(--text)}
.sb-item.ativo{background:var(--glow);color:var(--gold);border:1px solid rgba(201,168,76,.2)}
.sb-divider{height:1px;background:var(--border);margin:4px 0}
.hist-list{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:3px}
.hist-item{padding:8px 10px;border-radius:8px;cursor:pointer;font-size:12px;color:var(--text2);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:background .12s}
.hist-item:hover{background:var(--s2);color:var(--text)}

/* CHAT AREA */
#chat{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
#msgs{flex:1;overflow-y:auto;padding:20px 16px;display:flex;flex-direction:column;gap:14px;scroll-behavior:smooth}
#msgs::-webkit-scrollbar{width:3px}
#msgs::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* WELCOME */
#wlc{display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:24px;gap:18px;animation:fin .4s ease;min-height:200px}
@keyframes fin{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.wlc-ic{font-size:44px}
.wlc-t{font-size:19px;font-weight:700;color:var(--gold);text-align:center}
.wlc-s{font-size:13px;color:var(--text2);text-align:center;max-width:380px;line-height:1.7}
.sug-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%;max-width:460px}
.sug-card{background:var(--s2);border:1px solid var(--border);border-radius:var(--r);
  padding:11px 13px;cursor:pointer;transition:all .15s;display:flex;flex-direction:column;gap:4px}
.sug-card:hover{border-color:var(--gold);background:var(--glow);transform:translateY(-1px)}
.sug-ic{font-size:17px}
.sug-t{font-size:12px;font-weight:600;color:var(--text)}
.sug-q{font-size:11px;color:var(--text2);line-height:1.4}

/* MENSAGENS */
.msg-u{align-self:flex-end;max-width:80%;background:linear-gradient(135deg,rgba(201,168,76,.14),rgba(201,168,76,.07));
  border:1px solid rgba(201,168,76,.22);border-radius:18px 18px 4px 18px;
  padding:11px 15px;font-size:14px;line-height:1.6;animation:mi .2s ease}
@keyframes mi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.msg-l{align-self:flex-start;max-width:88%;background:var(--s2);border:1px solid var(--border);
  border-radius:4px 18px 18px 18px;padding:13px 15px;font-size:14px;line-height:1.7;
  animation:mi .2s ease;position:relative}
.msg-l.ia-msg{border-color:rgba(34,197,94,.2)}
.msg-header{display:flex;align-items:center;gap:8px;margin-bottom:9px;font-size:12px;color:var(--text3)}
.lex-av{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,#252518,#1c1c26);
  border:1.5px solid var(--gold);display:flex;align-items:center;justify-content:center;font-size:12px}
.badge{margin-left:auto;font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600;letter-spacing:.4px}
.badge-ia{background:rgba(34,197,94,.12);color:var(--green);border:1px solid rgba(34,197,94,.25)}
.badge-loc{background:rgba(85,85,106,.25);color:var(--text3);border:1px solid var(--border)}
.msg-body p{margin-bottom:7px}
.msg-body p:last-child{margin-bottom:0}
.msg-body strong{color:var(--gold2);font-weight:600}
.msg-body h3,.msg-body h4{color:var(--gold);margin:10px 0 5px;font-size:14px;font-weight:700}
.msg-body ul,.msg-body ol{padding-left:18px;margin-bottom:7px}
.msg-body li{margin-bottom:3px;line-height:1.55}
.msg-body code{background:var(--s3);border:1px solid var(--border);padding:1px 5px;
  border-radius:4px;font-size:12px;color:var(--gold2)}
.msg-body blockquote{border-left:3px solid var(--gold);padding:7px 11px;
  background:var(--glow);border-radius:0 8px 8px 0;margin:7px 0;color:var(--text2);font-style:italic}
.cursor{display:inline-block;width:2px;height:14px;background:var(--gold);
  animation:cur .8s infinite;vertical-align:middle;margin-left:1px}
@keyframes cur{0%,100%{opacity:1}50%{opacity:0}}

/* TYPING */
.typing-w{align-self:flex-start;background:var(--s2);border:1px solid var(--border);
  border-radius:4px 18px 18px 18px;padding:13px 18px;display:flex;align-items:center;gap:5px}
.tdot{width:7px;height:7px;border-radius:50%;background:var(--text3);animation:tb 1.2s infinite}
.tdot:nth-child(2){animation-delay:.2s}.tdot:nth-child(3){animation-delay:.4s}
@keyframes tb{0%,80%,100%{transform:none;opacity:.4}40%{transform:translateY(-6px);opacity:1}}

/* SUGESTÕES CTX */
.ctx-wrap{align-self:flex-start;display:flex;flex-wrap:wrap;gap:7px;max-width:88%;animation:fin .3s ease}
.ctx-btn{padding:6px 13px;background:var(--s2);border:1px solid var(--border);border-radius:20px;
  font-size:12px;color:var(--text2);cursor:pointer;transition:all .13s;white-space:nowrap}
.ctx-btn:hover{border-color:var(--gold);color:var(--gold);background:var(--glow)}

/* INPUT */
#input-area{flex-shrink:0;background:var(--s1);border-top:1px solid var(--border);padding:12px 14px}
.inp-wrap{background:var(--s2);border:1.5px solid var(--border);border-radius:var(--rl);
  display:flex;align-items:flex-end;gap:9px;padding:9px 13px;transition:border-color .2s}
.inp-wrap:focus-within{border-color:rgba(201,168,76,.4)}
#inp{flex:1;background:none;border:none;outline:none;color:var(--text);font-size:14px;
  line-height:1.5;resize:none;max-height:120px;min-height:22px;font-family:inherit}
#inp::placeholder{color:var(--text3)}
#btn-send{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold2));
  border:none;cursor:pointer;font-size:15px;flex-shrink:0;transition:all .15s;
  box-shadow:0 2px 10px rgba(201,168,76,.28);display:flex;align-items:center;justify-content:center}
#btn-send:hover:not(:disabled){transform:scale(1.06);box-shadow:0 4px 16px rgba(201,168,76,.4)}
#btn-send:disabled{opacity:.38;cursor:not-allowed;transform:none}
.inp-foot{display:flex;align-items:center;justify-content:space-between;margin-top:7px;padding:0 2px}
.inp-hint{font-size:11px;color:var(--text3)}
.mode-pills{display:flex;gap:7px}
.mpill{padding:3px 11px;border-radius:12px;font-size:11px;background:var(--s2);
  border:1px solid var(--border);color:var(--text3);cursor:pointer;transition:all .13s}
.mpill.ativo{background:var(--glow);color:var(--gold);border-color:rgba(201,168,76,.3)}

/* MODAL IA CONFIG */
#modal{position:fixed;inset:0;background:rgba(0,0,0,.72);display:none;
  align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(4px);padding:16px}
#modal.open{display:flex}
.modal-box{background:var(--s1);border:1px solid var(--border);border-radius:var(--rl);
  padding:26px;width:100%;max-width:420px;box-shadow:0 8px 40px rgba(0,0,0,.6);
  animation:mIn .25s ease}
@keyframes mIn{from{opacity:0;transform:scale(.95) translateY(10px)}to{opacity:1;transform:none}}
.m-close{float:right;background:var(--s2);border:1px solid var(--border);border-radius:8px;
  padding:3px 10px;font-size:17px;cursor:pointer;color:var(--text2);transition:color .15s}
.m-close:hover{color:var(--text)}
.m-title{font-size:17px;font-weight:700;color:var(--gold);margin-bottom:5px}
.m-sub{font-size:13px;color:var(--text2);margin-bottom:18px;line-height:1.6}
.m-step{background:var(--s2);border:1px solid var(--border);border-radius:var(--r);padding:13px;margin-bottom:11px}
.m-step:last-child{margin-bottom:0}
.m-num{width:20px;height:20px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:#0a0a0f;font-size:10px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;
  margin-right:7px}
.m-stitle{font-size:13px;font-weight:600}
.m-ssub{font-size:12px;color:var(--text2);margin-top:6px;line-height:1.55}
.m-link{color:var(--gold);text-decoration:none;font-weight:600}
.m-link:hover{text-decoration:underline}
.key-wrap{display:flex;gap:8px;margin-top:9px}
#key-inp{flex:1;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--r);
  padding:9px 13px;color:var(--text);font-size:13px;outline:none;font-family:monospace;
  transition:border-color .2s}
#key-inp:focus{border-color:var(--gold)}
#key-inp::placeholder{color:var(--text3);font-family:inherit}
#btn-key{padding:9px 18px;background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:#0a0a0f;font-size:13px;font-weight:700;border:none;border-radius:var(--r);
  cursor:pointer;transition:all .15s;white-space:nowrap}
#btn-key:hover:not(:disabled){transform:translateY(-1px)}
#btn-key:disabled{opacity:.5;cursor:not-allowed}
#m-status{text-align:center;padding:9px;border-radius:var(--r);font-size:13px;
  font-weight:600;margin-top:7px;display:none}
#m-status.ok{background:rgba(34,197,94,.1);color:var(--green);border:1px solid rgba(34,197,94,.3)}
#m-status.err{background:rgba(239,68,68,.1);color:var(--red);border:1px solid rgba(239,68,68,.3)}
#m-status.load{background:rgba(59,130,246,.1);color:#60a5fa;border:1px solid rgba(59,130,246,.3)}
</style>

<div id="splash">

function sortSugs() {

function enviarTxt(txt) {
  if (!txt || ENVIANDO) return;
  var wlc = document.getElementById('wlc');
  if (wlc && wlc.parentNode) wlc.remove();
  var cs = document.getElementById('ctx-sug');
  if (cs) cs.remove();

  adicionarMsgU(txt);
  ENVIANDO = true;
  var btn = document.getElementById('btn-send');
  if (btn) btn.disabled = true;

  HIST_CHAT.push({role:'user', content:txt});
  salvarPerg(txt);
  var tid = mostrarTyping();

  if (_A && _K) {
    chamarSistema(txt).then(function(resp) {
      removerTyping(tid);
      adicionarMsgL(resp, true);
      HIST_CHAT.push({role:'assistant', content:resp});
      setTimeout(function(){ mostrarCtxSugs(txt); }, 600);
      ENVIANDO = false;
      if (btn) btn.disabled = false;
    }).catch(function(err) {
      removerTyping(tid);
      // Fallback inteligente — não mostrar erro genérico
      var resp = respostaInteligente(txt);
      adicionarMsgL(resp, false);
      HIST_CHAT.push({role:'assistant', content:resp});
      setTimeout(function(){ mostrarCtxSugs(txt); }, 600);
      ENVIANDO = false;
      if (btn) btn.disabled = false;
    });
  } else {
    setTimeout(function() {
      removerTyping(tid);
      var resp = respostaInteligente(txt);
      adicionarMsgL(resp, false);
      HIST_CHAT.push({role:'assistant', content:resp});
      setTimeout(function(){ mostrarCtxSugs(txt); }, 600);
      ENVIANDO = false;
      if (btn) btn.disabled = false;
    }, 800 + Math.random()*600);
  }
}

// ══════════════════════════════════════════════
// CHAMADA AO SISTEMA
// ══════════════════════════════════════════════
function chamarSistema(texto) {
  return new Promise(function(resolve, reject) {
    var contents = [];
    var hist = HIST_CHAT.slice(-8);
    for (var i=0;i<hist.length;i++) {
      contents.push({
        role: hist[i].role === 'assistant' ? 'model' : 'user',
        parts: [{text: hist[i].content}]
      });
    }
    var last = contents[contents.length-1];
    if (!last || last.role !== 'user' || last.parts[0].text !== texto) {
      contents.push({role:'user', parts:[{text:texto}]});
    }

    var payload = {
      system_instruction: {parts:[{text:_SYS}]},
      contents: contents,
      generationConfig: {
        temperature: DETALHE ? 0.45 : 0.3,
        maxOutputTokens: DETALHE ? 900 : 650,
        topP: 0.92
      },
      safetySettings: [
        {category:'HARM_CATEGORY_HARASSMENT',        threshold:'BLOCK_NONE'},
        {category:'HARM_CATEGORY_HATE_SPEECH',       threshold:'BLOCK_NONE'},
        {category:'HARM_CATEGORY_SEXUALLY_EXPLICIT', threshold:'BLOCK_NONE'},
        {category:'HARM_CATEGORY_DANGEROUS_CONTENT', threshold:'BLOCK_NONE'}
      ]
    };

    var ep = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key='+_K;

    fetch(ep, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(payload)
    })
    .then(function(res) {
      if (!res.ok) {
        return res.json().catch(function(){return{};}).then(function(e){
          reject(new Error((e&&e.error&&e.error.message)||'status '+res.status));
        });
      }
      return res.json();
    })
    .then(function(data) {
      if (!data) return;
      var t = data &&
              data.candidates &&
              data.candidates[0] &&
              data.candidates[0].content &&
              data.candidates[0].content.parts &&
              data.candidates[0].content.parts[0] &&
              data.candidates[0].content.parts[0].text;
      if (!t) { reject(new Error('vazio')); return; }
      resolve(t.trim());
    })
    .catch(function(err){ reject(err); });
  });
}

// ══════════════════════════════════════════════
// BASE LOCAL INTELIGENTE (NLP + contexto)
// ══════════════════════════════════════════════
function respostaInteligente(txt) {
  var t = txt.toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/[.,!?;:]/g,' ');

  // Extrair números/anos da pergunta
  var anos = txt.match(/\b(19|20)\d{2}\b/g) || [];
  var valores = txt.match(/R\$\s?[\d.,]+/g) || [];
  var meses = txt.match(/\b(\d+)\s*(mes|meses|mês)\b/i);
  var anos_trab = txt.match(/\b(\d+)\s*(ano|anos)\b/i);

  // ── Detector de intenção por padrões compostos ──
  var score = {};
  var INTENTS = {
    demissao:       ['demiti','demissao','dispensa','rescisao','aviso previo','justa causa','fgts','seguro desemprego','fui mandado','me demitiram','perdi emprego'],
    hora_extra:     ['hora extra','horas extras','jornada','banco de horas','intervalo','descanso','trabalho mais'],
    assedio:        ['assedio','assediado','xingamento','humilhacao','pressao psicologica','ambiente toxico','bullying'],
    pejotizacao:    ['pj','pejota','pessoa juridica','mei','pejotiz','recontratado pj','demitido pj'],
    acidente:       ['acidente trabalho','acidente no trabalho','lesao','afastamento','acidentei','me machuquei trabalhando'],
    prescricao:     ['prescrit','prescricao','divida velha','divida antiga','divida de 20','debito antigo','nao paguei desde','anos sem pagar','2015','2016','2017','2018','2019'],
    penhora:        ['penhora','penhorar','bloquear conta','bloqueio judicial','bem de familia','salario penhorado','penhoraram'],
    superendiv:     ['superendividamento','dividas consomem','nao consigo pagar','dividas todas','credores','lei 14181','renegociacao forcada'],
    inss_negado:    ['inss negou','beneficio negado','pericia negou','indeferido inss','recurso inss','bpc negado','loas negado'],
    aposentadoria:  ['aposentar','aposentadoria','tempo contribuicao','reforma previdencia','requisitos aposentadoria'],
    plano_saude:    ['plano negou','plano de saude','ans','cirurgia negada','tratamento negado','convenio nao cobre','cobertura negada'],
    consumidor:     ['cobranca indevida','cobraram errado','produto defeituoso','nao entregou','propaganda enganosa','cancelamento','reembolso','garantia'],
    negativacao:    ['nome sujo','negativado','serasa','spc','protesto','inscrito spc','cadastro negativo'],
    divorcio:       ['divorcio','separacao','terminar casamento','dissolver uniao'],
    guarda:         ['guarda filho','guarda crianca','guarda compartilhada','visita filho','visitacao'],
    pensao:         ['pensao alimenticia','alimentos','pagar pensao','nao paga pensao','pensao atrasada'],
    heranca:        ['heranca','inventario','espolio','partilha','herdeiro','testamento','faleceu','falecimento'],
    despejo:        ['despejo','despejar','notificacao despejo','sair do imovel','expulsao aluguel'],
    aluguel:        ['aluguel','locatario','locador','inquilino','contrato aluguel','renovar aluguel','rescisao aluguel'],
    usucapiao:      ['usucapiao','posse','morando ha','ocupando ha','posso regularizar','anos no terreno','anos na terra'],
    criminal:       ['preso','prisao','delegacia','crime','policia','flagrante','habeas corpus','advogado criminal','boletim ocorrencia'],
    gestante:       ['gestante','gravida','licenca maternidade','maternidade','bebe','gravidez','amamentacao']
  };

  for (var intent in INTENTS) {
    score[intent] = 0;
    var kws = INTENTS[intent];
    for (var k=0;k<kws.length;k++) {
      if (t.indexOf(kws[k]) >= 0) {
        score[intent] += kws[k].length > 6 ? 3 : 2;
      }
    }
  }

  var melhor = Object.keys(score).reduce(function(a,b){ return score[a]>score[b]?a:b; });
  if (score[melhor] === 0) return respostaGenerica(txt);

  // Personalizar com dados extraídos da pergunta
  var anoRef = anos.length > 0 ? anos[0] : null;
  var anosT  = anos_trab ? parseInt(anos_trab[1]) : null;

  return gerarResposta(melhor, txt, anoRef, anosT, valores, meses);
}

function gerarResposta(intent, txt, anoRef, anosT, valores, meses) {

      var msgPrescr = '';

      }

function typewrite(el, html) {
  el.innerHTML = '';
  var tmp = document.createElement('div');
  tmp.innerHTML = html;
  var fullText = tmp.innerHTML;
  var i = 0;
  var speed = Math.max(2, Math.min(8, Math.floor(8000/fullText.length)));
  function tick() {
    if (i < fullText.length) {
      el.innerHTML = fullText.substring(0,i+1);
      i += Math.ceil(speed/2);
      var msgs = document.getElementById('msgs');
      if (msgs) msgs.scrollTop = msgs.scrollHeight;
      requestAnimationFrame(tick);
    } else {
      el.innerHTML = fullText;
    }
  }
  tick();
}

function markdownToHtml(md) {
  return md
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/^## (.+)$/gm,'<h3>$1</h3>')
    .replace(/^### (.+)$/gm,'<h4>$1</h4>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/`(.+?)`/g,'<code>$1</code>')
    .replace(/^- (.+)$/gm,'<li>$1</li>')
    .replace(/(<li>.*<\/li>)/s, function(m){ return '<ul>'+m+'</ul>'; })
    .replace(/^(\d+\. .+)$/gm,'<li class="num">$1</li>')
    .replace(/\n{2,}/g,'</p><p>')
    .replace(/\n/g,'<br>')
    .replace(/^(?!<[hul]|<\/|<li|<p)(.+)$/gm,'<p>$1</p>');
}

function escHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

  else sugs = ['Quais serviços jurídicos são gratuitos para mim?','Como a Defensoria Pública pode me ajudar?','Qual o prazo para entrar com ação?'];

function atualizarPerfil(txt) {
  var t = txt.toLowerCase();
  var nome = document.getElementById('sb-nome');
  var av   = document.getElementById('sb-av');
  if(!nome || !av) return;
  if(t.match(/demiti|emprego|trabalhando|trabalho/)) { nome.textContent='Trabalhador'; av.textContent='👔'; }
  else if(t.match(/inss|aposentadoria|beneficio/))   { nome.textContent='Beneficiário'; av.textContent='👴'; }
  else if(t.match(/divida|devedor|endividado/))       { nome.textContent='Consumidor'; av.textContent='💰'; }
  else if(t.match(/plano|saude|medico/))              { nome.textContent='Paciente'; av.textContent='🏥'; }
  else if(t.match(/aluguel|imovel|despejo/))          { nome.textContent='Inquilino'; av.textContent='🏠'; }
  else if(t.match(/crime|preso|policia/))             { nome.textContent='Cidadão'; av.textContent='⚖️'; }
  else                                                { nome.textContent='Cidadão'; av.textContent='⚖'; }
}

function salvarPerg(txt) {
  HIST_PERG.unshift({q:txt.substring(0,60), ts:Date.now()});
  if(HIST_PERG.length>15) HIST_PERG = HIST_PERG.slice(0,15);
  try { localStorage.setItem('sofia_hist', JSON.stringify(HIST_PERG)); } catch(e){}
  renderHist();
}

function renderHist() {
  var hl = document.getElementById('hist-list');
  if(!hl) return;
  hl.innerHTML = HIST_PERG.slice(0,8).map(function(h){
    var q = h.q.replace(/'/g,"\'");
    return '<div class="hist-item" onclick="enviarTxt(''+q+'')">💬 '+h.q+'</div>';
  }).join('');
}

function limparChat() {
  var msgs = document.getElementById('msgs');
  if(msgs) { msgs.innerHTML='<div id="wlc"></div>'; renderBV(); }
  HIST_CHAT = [];
}

function autoH(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120)+'px';
}

function keyE(e) {
  if(e.key==='Enter' && !e.shiftKey) { e.preventDefault(); enviar(); }
}

function setMode(m) {
  DETALHE = (m==='d');
  var pr  = document.getElementById('p-rap');
  var pd  = document.getElementById('p-det');
  var hin = document.getElementById('hint');
  if(pr) pr.className = 'mpill'+(m==='r'?' ativo':'');
  if(pd) pd.className = 'mpill'+(m==='d'?' ativo':'');
  if(hin) hin.textContent = DETALHE ? '📋 Modo detalhado — respostas completas com mais jurisprudência' : '⚡ Especialista jurídico pronto para sua consulta';
}
