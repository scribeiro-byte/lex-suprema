<style>
:root{

}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,-apple-system,sans-serif}
#splash{position:fixed;inset:0;z-index:9999;background:radial-gradient(ellipse at center,#0d0d20 0%,#07070d 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;transition:opacity .6s ease,visibility .6s ease;}
#splash.hide{opacity:0;visibility:hidden;pointer-events:none}
.sp-icon{font-size:72px;animation:pulse-icon 2s ease-in-out infinite}
@keyframes pulse-icon{0%,100%{transform:scale(1);filter:drop-shadow(0 0 8px rgba(201,168,76,.3))}50%{transform:scale(1.08);filter:drop-shadow(0 0 20px rgba(201,168,76,.8))}}
.sp-title{font-size:36px;font-weight:900;letter-spacing:4px;color:var(--gold);text-transform:uppercase}
.sp-sub{font-size:13px;color:var(--text2);letter-spacing:2px;text-transform:uppercase}
.sp-bar{width:200px;height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.sp-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));animation:bar-fill 2.5s ease-out forwards}
@keyframes bar-fill{from{width:0}to{width:100%}}
.sp-btn{margin-top:10px;padding:14px 48px;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#07070d;border:none;border-radius:30px;cursor:pointer;font-size:16px;font-weight:800;letter-spacing:1px;box-shadow:0 4px 20px rgba(201,168,76,.4);transition:transform .2s,box-shadow .2s;display:none;}
.sp-btn:hover{transform:translateY(-2px);box-shadow:0 6px 28px rgba(201,168,76,.6)}
.sp-btn.show{display:block;animation:fadeInUp .5s ease}
@keyframes fadeInUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
#app{display:none;flex-direction:column;height:100%;background:var(--bg);}
#app.show{display:flex}
.topbar{display:flex;align-items:center;gap:12px;padding:14px 18px;background:var(--surface);border-bottom:1px solid var(--border);box-shadow:0 2px 12px rgba(0,0,0,.3);position:relative;z-index:10;flex-shrink:0;}
.lx-icon{font-size:28px;filter:drop-shadow(0 0 6px rgba(201,168,76,.5))}
.brand-info{flex:1}
.top-brand{font-size:18px;font-weight:800;color:var(--gold);letter-spacing:2px}
.top-brand small{font-size:11px;color:var(--gold2);display:block;letter-spacing:1px;margin-top:1px;opacity:.8}
.status-dot{width:9px;height:9px;border-radius:50%;background:var(--gold);box-shadow:0 0 6px var(--gold);animation:blink 2s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
.status-dot.offline{background:#666;box-shadow:none;animation:none}
#chat{flex:1;overflow-y:auto;padding:16px 14px;display:flex;flex-direction:column;gap:14px;scroll-behavior:smooth;}
#chat::-webkit-scrollbar{width:4px}
#chat::-webkit-scrollbar-track{background:transparent}
#chat::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.msg{max-width:88%;padding:12px 16px;border-radius:var(--radius);line-height:1.6;font-size:14.5px;animation:msg-in .3s ease;}
@keyframes msg-in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.user{align-self:flex-end;background:linear-gradient(135deg,#1a1a35,#1e1e40);border:1px solid #2a2a55;color:var(--text);border-bottom-right-radius:4px;}
.msg.bot{align-self:flex-start;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-bottom-left-radius:4px;}
.msg.bot.error{border-color:var(--danger);background:#1a0a0a}
.msg-meta{font-size:11px;color:var(--text2);margin-top:6px;display:flex;align-items:center;gap:4px}

.msg h3{font-size:14px;color:var(--gold3);margin:6px 0 3px}
.msg ul{padding-left:18px;margin:6px 0}
.msg li{margin:3px 0}
.msg strong{color:var(--gold2)}
.msg code{background:#1a1a2e;padding:2px 6px;border-radius:4px;font-family:monospace;font-size:13px}
.msg a{color:var(--gold2);text-decoration:none}
.msg a:hover{text-decoration:underline}
.bot-badge{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;color:var(--gold);letter-spacing:1px;margin-bottom:6px;}

.typing-indicator span{width:7px;height:7px;border-radius:50%;background:var(--gold);animation:typing-dot 1.4s infinite;}
.typing-indicator span:nth-child(2){animation-delay:.2s}
.typing-indicator span:nth-child(3){animation-delay:.4s}
@keyframes typing-dot{0%,80%,100%{transform:scale(.8);opacity:.4}40%{transform:scale(1.2);opacity:1}}
.suggestions{display:flex;flex-wrap:wrap;gap:8px;padding:8px 14px 0;flex-shrink:0;}
.sug-btn{padding:7px 14px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer;font-size:12.5px;transition:all .2s;white-space:nowrap;}
.sug-btn:hover{border-color:var(--gold);color:var(--gold);background:rgba(201,168,76,.08)}
.input-area{display:flex;align-items:flex-end;gap:10px;padding:12px 14px 14px;background:var(--surface);border-top:1px solid var(--border);flex-shrink:0;}
#userInput{flex:1;padding:11px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:22px;color:var(--text);font-size:14.5px;resize:none;max-height:120px;font-family:inherit;line-height:1.5;transition:border-color .2s;outline:none;}
#userInput:focus{border-color:var(--gold)}
#userInput::placeholder{color:var(--text2)}
#sendBtn{width:44px;height:44px;border-radius:50%;border:none;cursor:pointer;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#07070d;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .2s,opacity .2s;box-shadow:0 2px 10px rgba(201,168,76,.3);}
#sendBtn:hover{transform:scale(1.1)}
#sendBtn:disabled{opacity:.4;transform:none;cursor:default}
.welcome-card{align-self:center;text-align:center;padding:28px 22px;margin:auto;background:var(--surface);border:1px solid var(--border);border-radius:20px;max-width:320px;width:100%;}
.welcome-card .wlc-icon{font-size:52px;margin-bottom:12px;display:block}
.welcome-card h2{color:var(--gold);font-size:20px;margin-bottom:6px;letter-spacing:1px}
.welcome-card p{color:var(--text2);font-size:13px;line-height:1.6}
.areas{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:16px;}
.area-tag{padding:5px 12px;border:1px solid var(--border);border-radius:12px;font-size:12px;color:var(--text2);background:var(--surface2);}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--border);padding:10px 20px;border-radius:20px;font-size:13px;color:var(--text);z-index:1000;animation:toast-in .3s ease;pointer-events:none;box-shadow:var(--shadow);}
@keyframes toast-in{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.offline-banner{background:#1a0e00;border-bottom:1px solid #4a3000;color:#c8a050;font-size:12px;text-align:center;padding:6px;display:none;flex-shrink:0;}
.offline-banner.show{display:block}
@media(min-width:600px){#app{max-width:480px;margin:0 auto;height:100vh;border-left:1px solid var(--border);border-right:1px solid var(--border)}}
</style>
</head>

function writer(el,txt,done){var rendered=md(txt);var badge='<div class="bot-badge"></div>';var meta='<div class="msg-meta">'+ts()+'</div>';if(rendered.length>600){el.innerHTML=badge+rendered+meta;id('chat').scrollTop=id('chat').scrollHeight;if(done)done();return;}var plain=rendered.replace(/<[^>]+>/g,'');el.innerHTML=badge+'<span id="tw"></span>'+meta;var tw=id('tw');var i=0;function s(){if(i<plain.length){tw.textContent+=plain[i++];id('chat').scrollTop=id('chat').scrollHeight;setTimeout(s,plain.length>400?8:12);}else{el.innerHTML=badge+rendered+meta;id('chat').scrollTop=id('chat').scrollHeight;if(done)done();}}s();}
function askGemini(q,cb){var msgs=[{role:'user',parts:[{text:SYS}]},{role:'model',parts:[{text:'Pronto para ajudar com questoes juridicas brasileiras.'}]}];hist.forEach(function(m){msgs.push(m);});var xhr=new XMLHttpRequest();xhr.open('POST',API,true);xhr.setRequestHeader('Content-Type','application/json');xhr.timeout=20000;xhr.onreadystatechange=function(){if(xhr.readyState===4){if(xhr.status===200){try{var d=JSON.parse(xhr.responseText);cb(null,d.candidates[0].content.parts[0].text);}catch(e){cb(e,null);}}else if(xhr.status===429){cb({quota:true},null);}else{cb(new Error('HTTP '+xhr.status),null);}}};xhr.ontimeout=function(){cb(new Error('timeout'),null);};xhr.onerror=function(){cb(new Error('network'),null);};xhr.send(JSON.stringify({contents:msgs,generationConfig:{temperature:0.7,maxOutputTokens:1200},safetySettings:[{category:'HARM_CATEGORY_HARASSMENT',threshold:'BLOCK_NONE'},{category:'HARM_CATEGORY_HATE_SPEECH',threshold:'BLOCK_NONE'},{category:'HARM_CATEGORY_SEXUALLY_EXPLICIT',threshold:'BLOCK_NONE'},{category:'HARM_CATEGORY_DANGEROUS_CONTENT',threshold:'BLOCK_NONE'}]}));}
function sendMsg(){var inp=id('userInput');var txt=inp.value.trim();if(!txt||busy)return;inp.value='';inp.style.height='auto';busy=true;id('sendBtn').disabled=true;setSugs([]);addMsg('user',txt,false);showTyp();askGemini(txt,function(err,resp){hideTyp();if(err){var loc=localOK(txt);if(loc){setStatus(false);var d=document.createElement('div');d.className='msg bot';id('chat').appendChild(d);writer(d,loc,function(){busy=false;id('sendBtn').disabled=false;setSugs(getSugs(txt));hist.push({role:'model',parts:[{text:loc}]});});}else{setStatus(false);var msg;if(err.quota)msg='**Cota Gemini esgotada** (plano gratuito)\n\nPara usar o Gemini:\n- Acesse aistudio.google.com/app/apikey\n- Crie nova chave ou ative o faturamento\n\nPosso ajudar com: trabalhista, INSS, consumidor, familia, penal, aluguel, LGPD.';else if(err.message==='timeout'||err.message==='network')msg='Sem conexao no momento. Tente de novo ou pergunte sobre: trabalhista, INSS, consumidor, familia, penal, aluguel.';else msg='Ocorreu um erro. Tente novamente em instantes.';addMsg('bot',msg,false);busy=false;id('sendBtn').disabled=false;setSugs(SUGS_DEFAULT);}}else{setStatus(true);var d=document.createElement('div');d.className='msg bot';id('chat').appendChild(d);writer(d,resp,function(){busy=false;id('sendBtn').disabled=false;setSugs(getSugs(txt));hist.push({role:'model',parts:[{text:resp}]});});}});}
function entrarApp(){id('splash').classList.add('hide');id('app').classList.add('show');var c=id('chat');var w=document.createElement('div');w.className='welcome-card';w.innerHTML='<span class="wlc-icon">&#9878;&#65039;</span><h2>Lex Mitio</h2><p>Assistente juridico gratuito para trabalhadores e cidadaos brasileiros. Descreva sua situacao.</p><div class="areas"><span class="area-tag">CLT</span><span class="area-tag">INSS</span><span class="area-tag">CDC</span><span class="area-tag">Familia</span><span class="area-tag">Penal</span><span class="area-tag">Aluguel</span><span class="area-tag">LGPD</span><span class="area-tag">Maria da Penha</span></div>';c.appendChild(w);setSugs(SUGS_DEFAULT);}
window.addEventListener('DOMContentLoaded',function(){setTimeout(function(){id('spBtn').classList.add('show');},2500);var inp=id('userInput');inp.addEventListener('input',function(){this.style.height='auto';this.style.height=Math.min(this.scrollHeight,120)+'px';});inp.addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}});});
if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('sw.js').catch(function(){});});}
window.entrarApp=entrarApp;window.sendMsg=sendMsg;
})();
</script>
