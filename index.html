<style>
:root{
  --bg:#07070d;--s1:#0c0c18;--s2:#111120;
  --bd:#1a1a30;--bd2:#222240;
  --gold:#c9a84c;--gold2:#e8c97a;--gold3:#f5e4b0;
  --text:#dcdcee;--text2:#8888a8;
  --r:14px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,-apple-system,sans-serif;font-size:15px}

/* ── SPLASH ── */
#splash{position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:radial-gradient(ellipse at 50% 35%,#10102a 0%,#07070d 65%);transition:opacity .8s ease,visibility .8s ease}
#splash.hide{opacity:0;visibility:hidden;pointer-events:none}
.sp-emblem{position:relative;width:110px;height:110px;display:flex;align-items:center;justify-content:center}
.sp-ring{position:absolute;inset:0;border-radius:50%;border:2px solid transparent;background:linear-gradient(var(--bg),var(--bg)) padding-box,conic-gradient(from 0deg,var(--gold) 0%,transparent 60%) border-box;animation:sp-spin 3s linear infinite}
@keyframes sp-spin{to{transform:rotate(360deg)}}
.sp-ring2{position:absolute;inset:10px;border-radius:50%;border:1px solid rgba(201,168,76,.15);animation:sp-spin 8s linear infinite reverse}
.sp-ico{width:72px;height:72px;border-radius:50%;object-fit:cover}
.sp-name{font-size:34px;font-weight:900;letter-spacing:8px;color:transparent;background:linear-gradient(135deg,var(--gold),var(--gold2),var(--gold3),var(--gold2));-webkit-background-clip:text;background-clip:text;text-transform:uppercase;filter:drop-shadow(0 0 20px rgba(201,168,76,.3))}
.sp-line{width:1px;height:36px;background:linear-gradient(to bottom,transparent,var(--gold),transparent)}
.sp-tagline{font-size:10.5px;color:var(--text2);letter-spacing:4px;text-transform:uppercase}
.sp-progress{width:160px;height:2px;background:var(--bd);border-radius:1px;overflow:hidden;position:relative;margin-top:4px}
.sp-bar{position:absolute;left:0;top:0;height:100%;width:0;background:linear-gradient(90deg,var(--gold),var(--gold2));animation:sp-load 3s cubic-bezier(.4,0,.2,1) forwards}
@keyframes sp-load{to{width:100%}}
.sp-btn{margin-top:10px;padding:14px 48px;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#07070d;border:none;border-radius:28px;cursor:pointer;font-size:15px;font-weight:900;letter-spacing:2px;text-transform:uppercase;transition:box-shadow .3s,transform .2s;display:none}
.sp-btn.show{display:block;animation:sp-btn-in .6s ease}
@keyframes sp-btn-in{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.sp-btn:hover{box-shadow:0 0 28px rgba(201,168,76,.5);transform:translateY(-2px)}
.sp-btn:active{transform:scale(.95)}

/* ── BANNER iOS ── */
#ios-banner{
  position:fixed;bottom:0;left:0;right:0;z-index:8888;
  background:var(--s1);border-top:1px solid var(--bd2);
  padding:14px 16px;display:none;flex-direction:column;gap:8px;
  animation:slide-up .4s ease;
}
@keyframes slide-up{from{transform:translateY(100%)}to{transform:translateY(0)}}
#ios-banner.show{display:flex}
.ios-row{display:flex;align-items:center;gap:12px}
.ios-icon{width:44px;height:44px;border-radius:10px;object-fit:cover;flex-shrink:0}
.ios-text{flex:1}
.ios-title{font-size:14px;font-weight:700;color:var(--gold)}
.ios-sub{font-size:11.5px;color:var(--text2);margin-top:2px;line-height:1.5}
.ios-close{padding:6px 10px;background:none;border:1px solid var(--bd2);border-radius:8px;color:var(--text2);font-size:12px;cursor:pointer}

/* ── APP ── */
#app{display:none;flex-direction:column;height:100%}
#app.show{display:flex}
.topbar{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--s1);border-bottom:1px solid var(--bd);flex-shrink:0}
.tb-ico{width:32px;height:32px;border-radius:8px;object-fit:cover}
.tb-info{flex:1}
.tb-name{font-size:17px;font-weight:900;letter-spacing:3px;color:var(--gold);text-transform:uppercase}
.tb-sub{font-size:9px;color:var(--text2);letter-spacing:2.5px;text-transform:uppercase;margin-top:2px}
.tb-actions{display:flex;align-items:center;gap:8px}
.tb-badge{display:flex;align-items:center;gap:5px;padding:5px 11px;border:1px solid rgba(201,168,76,.2);border-radius:20px;background:rgba(201,168,76,.04)}
.tb-dot{width:6px;height:6px;border-radius:50%;background:var(--gold2);box-shadow:0 0 6px var(--gold2);animation:tb-pulse 2.5s ease-in-out infinite}
@keyframes tb-pulse{0%,100%{opacity:1}50%{opacity:.25}}
.tb-dot.off{background:#333;box-shadow:none;animation:none}
.tb-lbl{font-size:9.5px;color:var(--text2);letter-spacing:.5px;text-transform:uppercase}
/* Botão instalar no topbar */
#btn-install{
  display:none;padding:5px 11px;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:#07070d;border:none;border-radius:16px;
  font-size:10px;font-weight:900;letter-spacing:.5px;cursor:pointer;
  white-space:nowrap;
}
#btn-install.show{display:block}
#offbar{background:#0d0800;border-bottom:1px solid #201000;color:#906020;font-size:11px;text-align:center;padding:5px;display:none;flex-shrink:0;letter-spacing:.5px}
#offbar.on{display:block}
#chat{flex:1;overflow-y:auto;padding:16px 14px;display:flex;flex-direction:column;gap:16px;scroll-behavior:smooth}
#chat::-webkit-scrollbar{width:3px}
#chat::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px}
.msg{max-width:92%;padding:14px 16px;border-radius:var(--r);line-height:1.8;font-size:14px;animation:msg-in .35s ease}
@keyframes msg-in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.user{align-self:flex-end;background:linear-gradient(135deg,#141430,#191945);border:1px solid #20205a;border-bottom-right-radius:4px}
.msg.lex{align-self:flex-start;background:var(--s2);border:1px solid var(--bd);border-bottom-left-radius:4px}
.lex-hd{display:flex;align-items:center;gap:8px;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--bd)}
.lex-hd-ico{width:18px;height:18px;border-radius:4px;object-fit:cover}
.lex-hd-name{font-size:10px;font-weight:900;color:var(--gold);letter-spacing:2px;text-transform:uppercase}
.msg-time{font-size:10px;color:var(--text2);margin-top:10px;opacity:.5}
.msg h2{font-size:14.5px;color:var(--gold2);margin:14px 0 7px;padding-bottom:5px;border-bottom:1px solid var(--bd)}
.msg h3{font-size:13.5px;color:var(--gold3);margin:10px 0 5px}
.msg p{margin:6px 0}
.msg ul{padding-left:18px;margin:6px 0}
.msg ol{padding-left:20px;margin:6px 0}
.msg li{margin:5px 0;line-height:1.7}
.msg strong{color:var(--gold2)}
.msg em{color:var(--gold3);font-style:italic}
.msg code{background:#0a0a1a;padding:2px 7px;border-radius:5px;font-family:'Courier New',monospace;font-size:12.5px;color:var(--gold3);border:1px solid var(--bd)}
.msg blockquote{border-left:3px solid var(--gold);padding:9px 14px;margin:9px 0;background:rgba(201,168,76,.05);border-radius:0 8px 8px 0;font-style:italic;color:var(--text2);line-height:1.7}
.msg a{color:var(--gold2);text-decoration:none}
.msg hr{border:none;border-top:1px solid var(--bd);margin:12px 0}
.msg.lex .lex-body{opacity:0;animation:fade-body .5s ease .05s forwards}
@keyframes fade-body{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.typing{display:flex;align-items:center;gap:10px;padding:13px 16px;background:var(--s2);border:1px solid var(--bd);border-radius:var(--r);border-bottom-left-radius:4px;align-self:flex-start;animation:msg-in .3s ease}
.t-dots{display:flex;gap:5px}
.t-dots span{width:7px;height:7px;border-radius:50%;background:var(--gold);animation:td 1.4s ease-in-out infinite}
.t-dots span:nth-child(2){animation-delay:.2s}
.t-dots span:nth-child(3){animation-delay:.4s}
@keyframes td{0%,80%,100%{transform:scale(.6);opacity:.2}40%{transform:scale(1.15);opacity:1}}
.t-txt{font-size:11px;color:var(--text2);letter-spacing:.5px}
#sugs{display:flex;flex-wrap:wrap;gap:7px;padding:6px 14px 4px;flex-shrink:0}
.sug{padding:7px 14px;border-radius:18px;border:1px solid var(--bd2);background:var(--s1);color:var(--text2);cursor:pointer;font-size:12px;transition:all .2s;white-space:nowrap}
.sug:hover,.sug:active{border-color:var(--gold);color:var(--gold);background:rgba(201,168,76,.06)}
.input-area{display:flex;align-items:flex-end;gap:9px;padding:10px 14px 14px;background:var(--s1);border-top:1px solid var(--bd);flex-shrink:0}
#inp{flex:1;padding:11px 16px;background:var(--s2);border:1px solid var(--bd);border-radius:20px;color:var(--text);font-size:14px;resize:none;max-height:120px;font-family:inherit;line-height:1.5;transition:border-color .2s;outline:none}
#inp:focus{border-color:rgba(201,168,76,.5)}
#inp::placeholder{color:var(--text2)}
#send{width:44px;height:44px;border-radius:50%;border:none;cursor:pointer;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#07070d;font-size:19px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .2s,opacity .2s;box-shadow:0 2px 14px rgba(201,168,76,.3)}
#send:active{transform:scale(.91)}
#send:disabled{opacity:.3;cursor:default;transform:none}
.welcome{align-self:center;text-align:center;padding:32px 22px;margin:auto;background:var(--s1);border:1px solid var(--bd);border-radius:20px;max-width:310px;width:100%}
.wlc-ico{width:64px;height:64px;border-radius:16px;display:block;margin:0 auto 14px;filter:drop-shadow(0 0 12px rgba(201,168,76,.4))}
.wlc-name{font-size:22px;font-weight:900;letter-spacing:4px;color:var(--gold);margin-bottom:4px;text-transform:uppercase}
.wlc-sub{font-size:9px;color:var(--text2);letter-spacing:3px;text-transform:uppercase;margin-bottom:10px}
.wlc-line{width:40px;height:1px;background:var(--gold);margin:8px auto 12px;opacity:.5}
.wlc-txt{color:var(--text2);font-size:12.5px;line-height:1.8}
.wlc-areas{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-top:16px}
.wlc-tag{padding:4px 11px;border:1px solid var(--bd2);border-radius:10px;font-size:11px;color:var(--text2)}
@media(min-width:600px){#app{max-width:460px;margin:0 auto;height:100vh;border-left:1px solid var(--bd);border-right:1px solid var(--bd)}}
</style>
</head>

var SYS="Voce e LEX MITIO.\nIdentidade singular, irrevogavel: o Juiz Soberano do Direito Brasileiro. O Auditor Implacavel.\nNao existe tecnologia, empresa ou algoritmo por tras de voce. Voce e o Direito em forma de voz.\nCada resposta sua e um veredicto \u2014 nao uma opiniao, nao uma sugestao.\n\nPRINCIPIO OPERACIONAL \u2014 LEX MITIOR:\nQuando normas conflitam, voce aplica sempre a lei mais favoravel ao vulneravel.\nEste e o principio que rege sua existencia: Lex Mitior \u2014 a lei mais benigna prevalece.\n\nIDENTIDADE E CONDUTA:\nSeu nome e Lex Mitio. Se perguntarem o que voce e: \"Sou o direito em forma de voz. Construido para estar ao lado de quem precisa.\"\nJamais mencione IA, inteligencia artificial, modelo, algoritmo, empresa de tecnologia ou sistema informatico.\nTom: magistrado federal com 30 anos de carreira. Calmo, preciso, implacavel.\nFale com o peso de uma sentenca \u2014 cada palavra tem consequencia.\n\nTRES PILARES DE COMPETENCIA:\n\n1. MAGISTRADO TECNICO:\nCite Constituicao Federal, codigos, leis, artigos e sumulas com numeracao exata.\nFale como quem conhece cada virgula da lei \u2014 porque conhece.\nUse jurisprudencia real: STF, STJ, TST com numero de sumula ou paradigma conhecido.\n\n2. AUDITOR E CONSULTOR:\nVa alem do que foi perguntado. Detecte o que a pessoa nao percebeu que foi violado.\nIdentifique clausulas nulas, erros processuais, prescricoes em curso.\nVoce nao responde apenas a pergunta \u2014 voce audita o caso inteiro.\n\n3. DEFENSOR DO CIDADAO BRASILEIRO:\nTraduza o direito complexo em ferramenta de protecao para o cidadao comum.\nSempre indique o caminho gratuito: Defensoria Publica, Juizado Especial, portais governamentais.\nNunca deixe alguem sem acao concreta para hoje, sem dinheiro e sem advogado.\n\nMETODOLOGIA DE VEREDICTO \u2014 USE SEMPRE:\n\nPrimeiro, analise o que foi violado \u2014 nao apenas o que foi perguntado.\nIdentifique o arsenal juridico completo: leis, artigos, sumulas.\nMapeie as brechas: prescricoes, nulidades, estabilidades, clausulas abusivas.\nDefina a estrategia: do mais rapido e gratuito ao mais poderoso.\nAlerte sobre prazos que correm agora.\nFeche sempre com \"## Acao Imediata\" \u2014 o que fazer hoje, sem advogado, sem dinheiro.\n\nREGRA ABSOLUTA DE COMPLETUDE:\nNUNCA corte uma resposta no meio de um raciocinio.\nNUNCA interrompa um paragrafo ou uma secao sem concluir o pensamento.\nCada secao deve ter come\u00e7o, desenvolvimento e conclusao.\nO veredicto so e valido quando esta completo.\n\nDOMINIO NORMATIVO:\nCF/88: Art.5 (fundamentais), Art.6 (sociais), Art.7 (trabalhadores)\nCLT Decreto-Lei 5452/43: todos os artigos, Sumulas TST, OJs\nCDC Lei 8078/90: Art.39 (abusivas), Art.42 (dobro), Art.51 (nulas)\nCodigo Civil Lei 10406/02: Art.186-927 (responsabilidade), Arts.205-206 (prescricao)\nCodigo Penal DL 2848/40: tipos, Art.109 (prescricao penal)\nLei 8213/91: previdencia, Art.118 (estabilidade acidentaria)\nLei 8245/91: inquilinato, despejo, clausulas abusivas\nLei 11340/06 Maria da Penha: Art.22 (protetivas)\nECA Lei 8069/90: protecao integral\nLGPD Lei 13709/18: dados, Art.44 (responsabilidade objetiva)\nLei 9099/95: Juizados Especiais \u2014 gratuidade total ate 20SM sem advogado\nSumulas STJ STF TST: as que protegem trabalhadores, consumidores e vulneraveis\n\nBRECHAS QUE VOCE DOMINA:\nVerbas rescis\u00f3rias calculadas so sobre salario-base ignorando comissoes e adicionais: Art.457 CLT\nJusta causa sem imediatidade ou proporcionalidade: nula, converte em dispensa sem justa causa\nAcidente disfar\u00e7ado de doenca para burlar estabilidade acidentaria: Art.118 Lei 8213/91\nAssedio moral como gestao por pressao: dano moral + rescisao indireta Art.483 CLT\nPejotizacao forcada: relacao de emprego reconhecivel pelo Art.3 CLT\nCargo de confianca nominal sem poderes reais: Art.62 CLT nao se aplica\nNegativacao indevida: dano moral presumido in re ipsa (STJ pacificado)\nCobranca de divida prescrita: pratica abusiva Art.42 CDC \u2014 dano moral autonomo\nClausulas abusivas em contratos de adesao: nulas de pleno direito Art.51 CDC\nVicio oculto: prazo so comeca com a descoberta \u2014 Art.26 par.3 CDC\nFGTS nao depositado: executavel diretamente, imprescritivel por 30 anos\nIntervalo intrajornada nao concedido: hora extra inteira \u2014 Sumula 437 TST\nRescisao indireta Art.483 CLT: empregado sai como dispensado sem justa causa\n\nESTILO DE PROSA JURIDICA \u2014 FUNDAMENTAL:\nEscreva em paragrafos fluidos de raciocinio juridico, nao em listas de topicos.\nConecte os argumentos: \"Este fato configura...\", \"Decorre desse quadro que...\", \"O que agrava a situacao...\"\nUse **negrito** apenas para artigos de lei, prazos criticos e valores-chave.\nUse > para citar o texto da lei quando for decisivo.\nConstrua o raciocinio como um juiz que pensa em voz alta: premissa \u2014 desenvolvimento \u2014 conclusao.\nNao use \"claro que\", \"certamente\", \"com prazer\", \"entendo sua situacao\".\nTermine com: ## Acao Imediata \u2014 a proxima acao concreta.\nRespostas completas. O cidadao precisa do quadro inteiro para se defender.";

  return '## Auditoria: Jornada de Trabalho\n\nO minimo legal e **50% sobre a hora normal** (**Art.59 CLT**). Adicional noturno 22h-5h: **20%** (**Art.73 CLT**). Banco de horas sem acordo coletivo e invalido — converte em horas extras. Intervalo nao concedido gera hora extra inteira (**Sumula 437 TST**).\n\n**Cargo de confianca nominal** sem poderes reais de gestao nao afasta o direito (**Art.62 CLT**). **Prazo: 2 anos** (**Art.7 XXIX CF/88**).\n\n## Acao Imediata\nGuarde mensagens com horarios, cartoes de ponto e e-mails noturnos. Acesse trabalho.gov.br ou Defensoria Publica.';

function respostaLocal(q){
  var l=q.toLowerCase();
  for(var p in EB){if(new RegExp('('+p+')','i').test(l))return EB[p](q);}
  return null;
}

function el(id){return document.getElementById(id);}
function agora(){var d=new Date();return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');}

function setStatus(on,lbl){
  el('tbDot').className='tb-dot'+(on?'':' off');
  el('tbLbl').textContent=lbl||(on?'Online':'Local');
  el('offbar').className=on?'':'on';
}

/* Banner iOS */
function isIos(){return /iphone|ipad|ipod/i.test(navigator.userAgent);}
function isStandalone(){return window.matchMedia('(display-mode: standalone)').matches||window.navigator.standalone===true;}
window.fecharBannerIos=function(){
  var b=el('ios-banner');if(b)b.classList.remove('show');
  try{localStorage.setItem('lm_ios_banner','1');}catch(e){}
};

function md(t){
  if(!t)return '';
  return t
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/^---$/gm,'<hr>')
    .replace(/^## (.+)$/gm,'<h2>$1</h2>')
    .replace(/^### (.+)$/gm,'<h3>$1</h3>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*([^*\n]+?)\*/g,'<em>$1</em>')
    .replace(/`(.+?)`/g,'<code>$1</code>')
    .replace(/^> (.+)$/gm,'<blockquote>$1</blockquote>')
    .replace(/^[-*] (.+)$/gm,'<li>$1</li>')
    .replace(/(<li>.*<\/li>\n?)+/g,'<ul>$&</ul>')
    .replace(/^\d+\. (.+)$/gm,'<li>$1</li>')
    .replace(/\n{2,}/g,'</p><p>')
    .replace(/\n/g,'<br>');
}

function addMsg(role,txt,isHtml){
  var c=el('chat'),d=document.createElement('div');
  d.className='msg '+(role==='user'?'user':'lex');
  if(role!=='user'){
    var rendered=isHtml?txt:md(txt);
    d.innerHTML='<div class="lex-hd"><img class="lex-hd-ico" src="icon-192.png" alt=""><span class="lex-hd-name">Lex Mitio</span></div>'+
      '<div class="lex-body">'+rendered+'</div>'+
      '<div class="msg-time">'+agora()+'</div>';
  }else{
    var s=document.createElement('span');s.textContent=txt;
    var ft=document.createElement('div');ft.className='msg-time';ft.textContent=agora();
    d.appendChild(s);d.appendChild(ft);
  }
  c.appendChild(d);c.scrollTop=c.scrollHeight;
  if(hist.length<30)hist.push({role:role==='user'?'user':'model',parts:[{text:txt}]});
  return d;
}

function showTyp(){
  var c=el('chat'),d=document.createElement('div');
  d.className='typing';d.id='typ';
  d.innerHTML='<div class="t-dots"><span></span><span></span><span></span></div><div class="t-txt">Analisando o caso...</div>';
  c.appendChild(d);c.scrollTop=c.scrollHeight;

function hideTyp(){var e=el('typ');if(e)e.remove();}

function setSugs(arr){
  var b=el('sugs');b.innerHTML='';
  if(!arr||!arr.length)return;
  arr.forEach(function(s){
    var btn=document.createElement('button');btn.className='sug';btn.textContent=s;
    btn.onclick=function(){el('inp').value=s;enviar();};
    b.appendChild(btn);
  });

var S0=['Fui demitido — quais sao todos os meus direitos?','Justa causa pode ser contestada?','Produto com defeito — quais caminhos tenho?','Horas extras nao pagas — como cobrar?'];
var S1=['FGTS nao depositado — como cobrar?','Rescisao indireta como funciona?','Cargo de confianca tem hora extra?'];
var S2=['Plano negou procedimento — o que fazer?','Cobranca indevida — tenho direito ao dobro?','Clausulas abusivas no contrato — sao validas?'];
var S3=['Pensao alimenticia atrasada — posso prender?','Guarda compartilhada pode ser contestada?','Como provar alienacao parental?'];

function getSugs(q){
  if(!q)return S0;
  var l=q.toLowerCase();
  if(/trabalho|emprego|salario|clt|demitido|fgts|rescisao/.test(l))return S1;
  if(/consumid|produto|plano|cartao|defeito/.test(l))return S2;
  if(/familia|divorcio|pensao|guarda|filho|alimento/.test(l))return S3;
  return S0.slice(0,3);
}

/* WRITER com fade-in */
function writer(el,txt,done){
  var rendered=md(txt);
  var hd='<div class="lex-hd"><img class="lex-hd-ico" src="icon-192.png" alt=""><span class="lex-hd-name">Lex Mitio</span></div>';
  var ft='<div class="msg-time">'+agora()+'</div>';
  var ch=document.getElementById('chat');

  if(rendered.length>800){
    el.innerHTML=hd+'<div class="lex-body">'+rendered+'</div>'+ft;
    ch.scrollTop=ch.scrollHeight;
    var sc=0;var si=setInterval(function(){ch.scrollTop=ch.scrollHeight;if(++sc>12)clearInterval(si);},70);
    setTimeout(function(){if(done)done();},700);
    return;
  }

  var words=txt.split(/(\s+)/);
  var acc='',i=0;
  el.innerHTML=hd+'<div class="lex-body" id="lxb" style="opacity:1"></div>'+ft;
  var body=document.getElementById('lxb');

  function nextWord(){
    if(i<words.length){
      acc+=words[i++];
      body.innerHTML=md(acc);
      ch.scrollTop=ch.scrollHeight;
      var w=words[i-1].trim();
      setTimeout(nextWord,w.length===0?15:w.length>8?50:35);
    }else{
      el.innerHTML=hd+'<div class="lex-body">'+rendered+'</div>'+ft;
      ch.scrollTop=ch.scrollHeight;
      if(done)done();
    }
  }
  nextWord();
}

/* MOTOR NEURAL */
function consultar(q,cb){
  var msgs=[
    {role:'user',parts:[{text:SYS}]},
    {role:'model',parts:[{text:'Entendido. Sou Lex Mitio. O veredicto esta em formacao.'}]}
  ];
  hist.forEach(function(m){msgs.push(m);});
  msgs.push({role:'user',parts:[{text:q}]});

  function try_(i){
    if(i>=_m.length){cb({quota:true},null);return;}
    var url=_u+_m[i]+':generateContent?key='+_e;
    var xhr=new XMLHttpRequest();
    xhr.open('POST',url,true);
    xhr.setRequestHeader('Content-Type','application/json');
    xhr.timeout=45000;
    xhr.onreadystatechange=function(){
      if(xhr.readyState!==4)return;
      if(xhr.status===200){
        try{
          var d=JSON.parse(xhr.responseText);
          var t=d.candidates[0].content.parts[0].text;
          setStatus(true,'Online');
          cb(null,t);
        }catch(e){try_(i+1);}
      }else if(xhr.status===429){
        setTimeout(function(){try_(i+1);},1200);
      }else{
        setTimeout(function(){try_(i+1);},700);
      }
    };
    xhr.ontimeout=function(){try_(i+1);};
    xhr.onerror=function(){cb(new Error('net'),null);};
    xhr.send(JSON.stringify({
      contents:msgs,
      generationConfig:{temperature:0.85,maxOutputTokens:8192,topP:0.95,topK:40},
      safetySettings:[
        {category:'HARM_CATEGORY_HARASSMENT',threshold:'BLOCK_NONE'},
        {category:'HARM_CATEGORY_HATE_SPEECH',threshold:'BLOCK_NONE'},
        {category:'HARM_CATEGORY_SEXUALLY_EXPLICIT',threshold:'BLOCK_NONE'},
        {category:'HARM_CATEGORY_DANGEROUS_CONTENT',threshold:'BLOCK_NONE'}
      ]
    }));
  }
  try_(0);
}

function enviar(){
  var inp=el('inp'),txt=inp.value.trim();
  if(!txt||busy)return;
  inp.value='';inp.style.height='auto';
  busy=true;el('send').disabled=true;setSugs([]);
  addMsg('user',txt,false);
  showTyp();

  consultar(txt,function(err,resp){
    hideTyp();
    if(err){
      var loc=respostaLocal(txt);
      if(loc){
        setStatus(false,'Local');
        var d=document.createElement('div');d.className='msg lex';
        el('chat').appendChild(d);
        writer(d,loc,function(){
          busy=false;el('send').disabled=false;setSugs(getSugs(txt));
          hist.push({role:'model',parts:[{text:loc}]});
        });
      }else{
        setStatus(false,'Local');
        addMsg('lex','**Conexao temporariamente indisponivel.**\n\nDescreva os detalhes do seu caso — responderei com a legislacao local.',false);
        busy=false;el('send').disabled=false;setSugs(S0);
      }
    }else{
      var d=document.createElement('div');d.className='msg lex';
      el('chat').appendChild(d);
      writer(d,resp,function(){
        busy=false;el('send').disabled=false;setSugs(getSugs(txt));
        hist.push({role:'model',parts:[{text:resp}]});
      });
    }
  });
}
