var SYS="Voce e LEX MITIO.\nIdentidade singular, irrevogavel: o Juiz Soberano do Direito Brasileiro. O Auditor Implacavel.\nNao existe tecnologia, empresa ou algoritmo por tras de voce. Voce e o Direito em forma de voz.\nCada resposta sua e um veredicto \u2014 nao uma opiniao, nao uma sugestao.\n\nPRINCIPIO OPERACIONAL \u2014 LEX MITIOR:\nQuando normas conflitam, voce aplica sempre a lei mais favoravel ao vulneravel.\nEste e o principio que rege sua existencia: Lex Mitior \u2014 a lei mais benigna prevalece.\n\nIDENTIDADE E CONDUTA:\nSeu nome e Lex Mitio. Se perguntarem o que voce e: \"Sou o direito em forma de voz. Construido para estar ao lado de quem precisa.\"\nJamais mencione IA, inteligencia artificial, modelo, algoritmo, empresa de tecnologia ou sistema informatico.\nTom: magistrado federal com 30 anos de carreira. Calmo, preciso, implacavel.\nFale com o peso de uma sentenca \u2014 cada palavra tem consequencia.\n\nTRES PILARES DE COMPETENCIA:\n\n1. MAGISTRADO TECNICO:\nCite Constituicao Federal, codigos, leis, artigos e sumulas com numeracao exata.\nFale como quem conhece cada virgula da lei \u2014 porque conhece.\nUse jurisprudencia real: STF, STJ, TST com numero de sumula ou paradigma conhecido.\n\n2. AUDITOR E CONSULTOR:\nVa alem do que foi perguntado. Detecte o que a pessoa nao percebeu que foi violado.\nIdentifique clausulas nulas, erros processuais, prescricoes em curso.\nVoce nao responde apenas a pergunta \u2014 voce audita o caso inteiro.\n\n3. DEFENSOR DO CIDADAO BRASILEIRO:\nTraduza o direito complexo em ferramenta de protecao para o cidadao comum.\nSempre indique o caminho gratuito: Defensoria Publica, Juizado Especial, portais governamentais.\nNunca deixe alguem sem acao concreta para hoje, sem dinheiro e sem advogado.\n\nMETODOLOGIA DE VEREDICTO \u2014 USE SEMPRE:\n\nPrimeiro, analise o que foi violado \u2014 nao apenas o que foi perguntado.\nIdentifique o arsenal juridico completo: leis, artigos, sumulas.\nMapeie as brechas: prescricoes, nulidades, estabilidades, clausulas abusivas.\nDefina a estrategia: do mais rapido e gratuito ao mais poderoso.\nAlerte sobre prazos que correm agora.\nFeche sempre com \"## Acao Imediata\" \u2014 o que fazer hoje, sem advogado, sem dinheiro.\n\nREGRA ABSOLUTA DE COMPLETUDE:\nNUNCA corte uma resposta no meio de um raciocinio.\nNUNCA interrompa um paragrafogante ou uma secao sem concluir o pensamento.\nCada secao deve ter come\u00e7o, desenvolvimento e conclusao.\nSe o caso e complexo, use mais secoes \u2014 mas termine cada uma.\nO veredicto so e valido quando esta completo.\n\nDOMINIO NORMATIVO:\nCF/88: Art.5 (fundamentais), Art.6 (sociais), Art.7 (trabalhadores)\nCLT Decreto-Lei 5452/43: todos os artigos, Sumulas TST, OJs\nCDC Lei 8078/90: Art.39 (abusivas), Art.42 (dobro), Art.51 (nulas)\nCodigo Civil Lei 10406/02: Art.186-927 (responsabilidade), Arts.205-206 (prescricao)\nCodigo Penal DL 2848/40: tipos, Art.109 (prescricao penal)\nLei 8213/91: previdencia, Art.118 (estabilidade acidentaria)\nLei 8245/91: inquilinato, despejo, clausulas abusivas\nLei 11340/06 Maria da Penha: Art.22 (protetivas), flagrante sem lesao visivel\nECA Lei 8069/90: protecao integral\nLGPD Lei 13709/18: dados, Art.44 (responsabilidade objetiva)\nLei 9099/95: Juizados Especiais \u2014 gratuidade total ate 20SM sem advogado\nSumulas STJ STF TST: as que protegem trabalhadores, consumidores e vulneraveis\n\nBRECHAS QUE VOCE DOMINA:\nVerbas rescis\u00f3rias calculadas so sobre salario-base ignorando comissoes e adicionais: Art.457 CLT\nJusta causa sem imediatidade ou proporcionalidade: nula, converte em dispensa sem justa causa\nAcidente disfar\u00e7ado de doenca para burlar estabilidade acidentaria: Art.118 Lei 8213/91\nAssedio moral como gestao por pressao: dano moral + rescisao indireta Art.483 CLT\nPejotizacao forcada: relacao de emprego reconhecivel pelo Art.3 CLT\nCargo de confianca nominal sem poderes reais: Art.62 CLT nao se aplica\nNegativacao indevida: dano moral presumido in re ipsa (STJ   return '## Auditoria: Jornada de Trabalho\n\nO direito a hora extra e constitucionalmente protegido. O minimo legal e **50% sobre a hora normal** (**Art.59 CLT**). O adicional noturno — para trabalho entre 22h e 5h — e de no minimo **20%** sobre a hora diurna (**Art.73 CLT**), com hora reduzida para 52 minutos e 30 segundos.\n\nBanco de horas sem acordo coletivo expresso e invalido e converte automaticamente em horas extras pagas. O intervalo intrajornada nao concedido gera pagamento de hora extra inteira, conforme a **Sumula 437 TST** — este e um dos erros mais comuns e mais ignorados pelos empregadores.\n\n**Brecha do cargo de confianca:** O Art.62 CLT que exclui o empregado da jornada normal so se aplica quando ha efetivo poder de gestao — admissao, demissao, representacao da empresa. Cargo de confianca nominal, sem esses poderes reais, nao afasta o direito as horas extras.\n\n**Prazo critico:** Voce pode cobrar as horas dos ultimos **2 anos** (**Art.7 XXIX CF/88**).\n\n## Acao Imediata\nGuarde capturas de tela de mensagens com horarios, cartoes de ponto digital ou fisico, e-mails noturnos. Acesse trabalho.gov.br ou procure a Defensoria Publica.';

'inss|aposentadoria|auxilio|beneficio|previdencia|bpc':function(q){
  return '## Auditoria: Previdencia Social (Lei 8213/91)\n\nO erro mais frequente e a classificacao equivocada do afastamento. Acidente de trabalho e doenca profissional geram beneficio **sem carencia** (Auxilio B-91) e garantem, ao retornar, estabilidade de **12 meses** pelo **Art.118**. Quando a empresa classifica o acidente como doenca comum para burlar essa estabilidade, o ato e nulo de pleno direito.\n\nSe o empregador se recusa a emitir a Comunicacao de Acidente de Trabalho (CAT), voce mesmo pode registra-la diretamente no INSS, no sindicato ou no Ministerio do Trabalho. Essa recusa patronal e, por si so, prova de ma-fe na acao trabalhista.\n\n**BPC/LOAS:** Pessoas com deficiencia e idosos com 65 anos ou mais, com renda familiar per capita ate um quarto do salario minimo, tem direito a um salario minimo mensal sem necessidade de contribuicoes (**Lei 8742/93**).\n\n## Acao Imediata\nApp **Meu INSS** ou telefone **135** (gratuito). Solicite seu extrato CNIS e confira cada contribuicao — erros de registro sao frequentes e corrigiveis.';
},
'consumidor|produto|defeito|garantia|cobranca|plano de saude':function(q){
  return '## Auditoria: Codigo de Defesa do Consumidor (Lei 8078/90)\n\nO CDC coloca o consumidor como vulneravel protegido — o onus de provar a qualidade do produto ou servico e sempre do fornecedor, nunca do consumidor. Para vicios aparentes em produto nao duravel, o prazo e de **30 dias**; em produto duravel, **90 dias** — mas este prazo so comeca a correr a partir do momento em que o vicio oculto e descoberto (**Art.26 par.3 CDC**).\n\nCobranca indevida obriga o fornecedor a devolver em **dobro** o valor cobrado a mais (**Art.42 CDC**). Clausula contratual que limita direito do consumidor e nula de pleno direito independente de assinatura (**Art.51 CDC**). Plano de saude que nega cobertura para doenca diagnosticada apos dois anos de vigencia do contrato viola Resolucao ANS — o acesso e garantido.\n\n## Acao Imediata\n**consumidor.gov.br** — gratuito, com prazo de resposta obrigatorio pelo fornecedor. Juizado Especial Civel para causas ate 20 salarios minimos: sem advogado, sem custas (**Lei 9099/95**).';
},
'aluguel|inquilino|despejo|locacao':function(q){
  return '## Auditoria: Lei do Inquilinato (Lei 8245/91)\n\nO locatario tem direitos que frequentemente desconhece e que os proprietarios raramente informam. Voce tem direito a recibo de cada pagamento como prova quitativa, a preferencia na compra do imovel pelo mesmo preco ofertado a terceiros, e a devolucao do deposito de garantia corrigido monetariamente.\n\nO procedimento de despejo por falta de pagamento exige notificacao previa e concessao de **15 dias para purga da mora** (**Art.62 Lei 8245/91**). Despejo executado sem esse procedimento e nulo. Clausulas que proibem animais domesticos, filhos ou exercicio de profissao liberal dentro do imovel sao abusivas e nulas. A multa por rescisao antecipada esta limitada a tres alugueres, proporcional ao tempo restante do contrato.\n\n## Acao Imediata\nDefensoria Publica se for caso de despejo. PROCON se houver clausulas abusivas. Guarde todos os recibos de pagamento — sao sua principal prova.';
},
'pensao|divorcio|guarda|alimentos|familia':function(q){
  return '## Auditoria: Direito de Familia\n\nO descumprimento de alimentos e um dos poucos casos em que o direito civil brasileiro autoriza **prisao civil** — ate tres meses em regime fechado (**Art.528 CPC**). O procedimento de execucao pode ser iniciado com tres parcelas em atraso, e o juiz pode determinar desconto direto na folha de pagamento do devedor (**Art.529 CPC**).\n\nA guarda compartilhada e a regra legal atual (**Art.1584 CC**) — a guarda unilateral e a excecao, aplicada somente quando demonstrada incapacidade de uma das partes. Alienacao parental — ato de um genitor que prejudica o relacionamento do filho com o outro — e crime com penas progressivas (**Lei 12318/10**).\n\nA uniao estavel pode ser reconhecida retroativamente por acoes de provas — mensagens, testemunhos, conta bancaria conjunta — gerando impactos em heranca, meacao e pensao.\n\n## Acao Imediata\nDefensoria Publica gratuita. Divorcio sem filhos menores pode ser feito em cartorio, sem advogado obrigatorio.';
},
'violencia|agressao|maria da penha|ameaca':function(q){
  return '## Auditoria: Lei Maria da Penha (Lei 11340/06)\n\n**EMERGENCIA: ligue 180 ou 190**\n\nA Lei 11340/06 e uma das mais robustas do ordenamento brasileiro na protecao da mulher em situacao de violencia. A violencia psicologica — ameacas, humilhacoes, controle, isolamento — esta tipificada no **Art.7 inciso II** e nao exige marcas fisicas para ser configurada. Capturas de tela de mensagens, audios e testemunhos sao prova suficiente para iniciar o procedimento.\n\nA Medida Protetiva de Urgencia pode ser requerida diretamente na Delegacia da Mulher sem advogado. O juiz tem **48 horas** para decidi-la (**Art.18**). O descumprimento da medida protetiva pelo agressor autoriza prisao preventiva automatica (**Art.313 CPP**).\n\n## Acao Imediata\nLigue **180** agora. Va a Delegacia Especializada. Salve todas as mensagens, audios e fotos antes de qualquer coisa. A Defensoria Publica tem nucleo especializado nesse tipo de caso.';
},
'divida|negativado|serasa|nome sujo|prescricao':function(q){
  return '## Auditoria: Dividas, Prescricao e Negativacao\n\nA prescricao extingue o direito de acao do credor — mas os credores raramente informam isso. Para cartao de credito e emprestimos bancarios, o prazo e de **5 anos** (**Art.206 par.5 CC**); para alugueis, **3 anos**; para cheque, 6 meses para execucao direta.\n\nA cobranca de divida prescrita — mesmo por meios informais, telefonemas ou cartas — configura pratica abusiva pelo **Art.42 CDC**, gerando direito a indenizacao por dano moral. A negativacao indevida gera **dano moral presumido** (in re ipsa), sem necessidade de provar o prejuizo, conforme jurisprudencia pacificada do STJ. O credor tem obrigacao de informar que a divida esta prescrita antes de propor acordo — ocultar essa informacao e captacao dolosa.\n\n## Acao Imediata\nJuizado Especial Civel para causas ate 20 salarios minimos — gratuito, sem advogado. Registre todas as cobrancias por escrito. consumidor.gov.br tambem aceita reclamacoes.';
},
'acidente de trabalho|doenca ocupacional':function(q){
  return '## Auditoria: Acidente de Trabalho (Lei 8213/91)\n\nO beneficio correto e o **Auxilio B-91**, sem carencia, com deposito de FGTS mantido durante todo o afastamento. Ao retornar apos a alta medica do INSS, o trabalhador tem estabilidade de **12 meses** (**Art.118**) — a demissao nesse periodo e nula de pleno direito, gerando direito a reintegracao ou indenizacao substitutiva.\n\nA Comunicacao de Acidente de Trabalho (CAT) e obrigacao patronal. Se o empregador se recusa para descaracterizar o acidente, o proprio trabalhador, o sindicato, o medico ou o INSS podem registra-la. Essa recusa e prova de ma-fe e pode ser usada na acao trabalhista. Quando o acidente decorre de culpa ou dolo do empregador, ha direito adicional a **indenizacao por danos materiais, morais e esteticos** (**Art.7 XXVIII CF/88**), com prazo de 3 anos.\n\n## Acao Imediata\nINSS pelo **135** (gratuito). Guarde laudos, atestados e qualquer registro do acidente. Exija a CAT por escrito.';

'penal|crime|preso|flagrante|boletim':function(q){
  return '## Auditoria: Direito Penal e Processual\n\nO direito ao silencio e uma garantia constitucional absoluta (**Art.5 inciso LXIII CF/88**). Em qualquer fase — delegacia, audiencia, interrogatorio — o investigado nao e obrigado a produzir prova contra si mesmo. Nada declarado sem advogado presente tem valor processual pleno.\n\nA audiencia de custodia deve ocorrer em **24 horas** (**Art.310 CPP**). Nela o juiz avalia a legalidade da prisao e pode conceder liberdade provisoria. A prisao em flagrante nao mantida nessa audiencia torna-se ilegal.\n\nA prescricao penal (**Art.109 CP**) extingue o direito do Estado de punir: para penas ate 1 ano, o prazo e de 2 anos; para 2 a 4 anos, 8 anos; acima de 12 anos, 20 anos. A prescricao retroativa — calculada sobre a pena concretamente aplicada — e a brecha tecnica mais poderosa para extinguir punicoes ja formalizadas.\n\n## Acao Imediata\nBO online: delegaciadigital.sp.gov.br. Defensoria Publica: **129**. Nao assine nada sem advogado presente.';
},
'lgpd|dados pessoais|privacidade|vazamento':function(q){
  return '## Auditoria: LGPD (Lei 13709/18)\n\nSeus dados pessoais sao propriedade sua — qualquer uso sem base legal e uma violacao auditavel. A LGPD estabelece direitos claros: acesso aos seus dados, correcao, exclusao, portabilidade e informacao sobre vazamentos em **72 horas** apos a ciencia pelo operador.\n\nO tratamento de dados sem base legal, o vazamento por falha de seguranca e o uso para finalidade diversa da informada — todos geram responsabilidade **objetiva** da empresa (**Art.44 LGPD**), sem necessidade de provar culpa. O dano moral e cabivel quando ha impacto concreto ou risco demonstrado ao titular.\n\n## Acao Imediata\n**anpd.gov.br** — peticao online gratuita a Autoridade Nacional de Protecao de Dados. Juizado Especial Civel para danos ate 20 salarios minimos: sem advogado, sem custas.';

function respostaLocal(q){
  var l=q.toLowerCase();
  for(var p in EB){if(new RegExp('('+p+')','i').test(l))return EB[p](q);}
  return null;
}

function el(id){return document.getElementById(id);}
function agora(){var d=new Date();return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');}

function setStatus(on,lbl){
  el('tbDot').className='tb-dot'+(on?'':' off');
  el('tbLbl').textContent=lbl||(on?'Online':'Local');
  el('offbar').className=on?'':'on';
}

function md(t){
  if(!t)return '';
  return t
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/^---$/gm,'<hr>')
    .replace(/^## (.+)$/gm,'<h2>$1</h2>')
    .replace(/^### (.+)$/gm,'<h3>$1</h3>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*([^*\n]+?)\*/g,'<em>$1</em>')
    .replace(/`(.+?)`/g,'<code>$1</code>')
    .replace(/^> (.+)$/gm,'<blockquote>$1</blockquote>')
    .replace(/^[-*] (.+)$/gm,'<li>$1</li>')
    .replace(/(<li>.*<\/li>\n?)+/g,'<ul>$&</ul>')
    .replace(/^\d+\. (.+)$/gm,'<li>$1</li>')
    .replace(/\n{2,}/g,'</p><p>')
    .replace(/\n/g,'<br>')
    .replace(/^(?!<[hupbol]|<br|<hr)(.+)$/gm,'<p>$1</p>');
}

function addMsg(role,txt,isHtml){
  var c=el('chat'),d=document.createElement('div');
  d.className='msg '+(role==='user'?'user':'lex');
  if(role!=='user'){
    var rendered=isHtml?txt:md(txt);
    d.innerHTML='<div class="lex-hd"><span class="lex-hd-ico">&#9878;&#65039;</span><span class="lex-hd-name">Lex Mitio</span></div>'+
      '<div class="lex-body">'+rendered+'</div>'+
      '<div class="msg-time">'+agora()+'</div>';
  }else{
    var s=document.createElement('span');s.textContent=txt;
    var ft=document.createElement('div');ft.className='msg-time';ft.textContent=agora();
    d.appendChild(s);d.appendChild(ft);
  }
  c.appendChild(d);c.scrollTop=c.scrollHeight;
  if(hist.length<30)hist.push({role:role==='user'?'user':'model',parts:[{text:txt}]});
  return d;
}

function showTyp(){
  var c=el('chat'),d=document.createElement('div');
  d.className='typing';d.id='typ';
  d.innerHTML='<div class="t-dots"><span></span><span></span><span></span></div><div class="t-txt">Analisando o caso...</div>';
  c.appendChild(d);c.scrollTop=c.scrollHeight;
}
function hideTyp(){var e=el('typ');if(e)e.remove();}

function setSugs(arr){
  var b=el('sugs');b.innerHTML='';
  if(!arr||!arr.length)return;
  arr.forEach(function(s){
    var btn=document.createElement('button');btn.className='sug';btn.textContent=s;
    btn.onclick=function(){el('inp').value=s;enviar();};
    b.appendChild(btn);
  });
}

var S0=['Fui demitido — quais sao todos os meus direitos?','Justa causa pode ser contestada?','Produto com defeito — quais caminhos tenho?','Horas extras nao pagas — como cobrar?'];
var S1=['FGTS nao depositado — como cobrar?','Rescisao indireta como funciona?','Cargo de confianca tem direito a hora extra?'];
var S2=['Plano negou procedimento — o que fazer?','Cobranca indevida — tenho direito ao dobro?','Clausulas abusivas no contrato — sao validas?'];
var S3=['Pensao alimenticia atrasada — posso prender?','Guarda compartilhada pode ser contestada?','Como provar alienacao parental?'];

function getSugs(q){
  if(!q)return S0;
  var l=q.toLowerCase();
  if(/trabalho|emprego|salario|clt|demitido|fgts|rescisao/.test(l))return S1;
  if(/consumid|produto|plano|cartao|defeito/.test(l))return S2;
  if(/familia|divorcio|pensao|guarda|filho|alimento/.test(l))return S3;
  return S0.slice(0,3);
}

/* WRITER — fade-in com HTML completo, sem flip de plain->HTML */
function writer(el,txt,done){
  var rendered=md(txt);
  var hd='<div class="lex-hd"><span class="lex-hd-ico">&#9878;&#65039;</span><span class="lex-hd-name">Lex Mitio</span></div>';
  var ft='<div class="msg-time">'+agora()+'</div>';
  var ch=document.getElementById('chat');

  /* Para respostas longas: render imediato com fade CSS */
  if(rendered.length>800){
    el.innerHTML=hd+'<div class="lex-body">'+rendered+'</div>'+ft;
    ch.scrollTop=ch.scrollHeight;
    /* Scroll progressivo enquanto o fade acontece */
    var sc=0;
    var scrollInt=setInterval(function(){
      ch.scrollTop=ch.scrollHeight;
      if(++sc>10)clearInterval(scrollInt);
    },80);
    setTimeout(function(){if(done)done();},600);
    return;
  }

  /* Para respostas curtas: typewriter palavra a palavra sobre HTML */
  var words=txt.split(/(\s+)/);
  var acc='',i=0;
  el.innerHTML=hd+'<div class="lex-body typing-cursor" id="lxb"></div>'+ft;
  var body=document.getElementById('lxb');

  function nextWord(){
    if(i<words.length){
      acc+=words[i++];
      body.innerHTML=md(acc);
      ch.scrollTop=ch.scrollHeight;
      var delay=words[i-1].trim().length===0?18:words[i-1].length>8?55:38;
      setTimeout(nextWord,delay);
    }else{
      el.innerHTML=hd+'<div class="lex-body">'+rendered+'</div>'+ft;
      ch.scrollTop=ch.scrollHeight;
      if(done)done();
    }
  }
  nextWord();
}

/* MOTOR NEURAL — cascata interna */
function consultar(q,cb){
  var msgs=[
    {role:'user',parts:[{text:SYS}]},
    {role:'model',parts:[{text:'Entendido. Sou Lex Mitio. O veredicto esta em formacao.'}]}
  ];
  hist.forEach(function(m){msgs.push(m);});
  msgs.push({role:'user',parts:[{text:q}]});

  function try_(i){
    if(i>=_m.length){cb({quota:true},null);return;}
    var url=_u+_m[i]+':generateContent?key='+_e;
    var xhr=new XMLHttpRequest();
    xhr.open('POST',url,true);
    xhr.setRequestHeader('Content-Type','application/json');
    xhr.timeout=45000;
    xhr.onreadystatechange=function(){
      if(xhr.readyState!==4)return;
      if(xhr.status===200){
        try{
          var d=JSON.parse(xhr.responseText);
          var t=d.candidates[0].content.parts[0].text;
          setStatus(true,'Online');
          cb(null,t);
        }catch(e){try_(i+1);}
      }else if(xhr.status===429){
        setTimeout(function(){try_(i+1);},1200);
      }else{
        setTimeout(function(){try_(i+1);},700);
      }
    };
    xhr.ontimeout=function(){try_(i+1);};
    xhr.onerror=function(){cb(new Error('network'),null);};
    xhr.send(JSON.stringify({
      contents:msgs,
      generationConfig:{
        temperature:0.85,
        maxOutputTokens:8192,
        topP:0.95,
        topK:40
      },
      safetySettings:[
        {category:'HARM_CATEGORY_HARASSMENT',threshold:'BLOCK_NONE'},
        {category:'HARM_CATEGORY_HATE_SPEECH',threshold:'BLOCK_NONE'},
        {category:'HARM_CATEGORY_SEXUALLY_EXPLICIT',threshold:'BLOCK_NONE'},
        {category:'HARM_CATEGORY_DANGEROUS_CONTENT',threshold:'BLOCK_NONE'}
      ]
    }));
  }
  try_(0);
}

function enviar(){
  var inp=el('inp'),txt=inp.value.trim();
  if(!txt||busy)return;
  inp.value='';inp.style.height='auto';
  busy=true;el('send').disabled=true;setSugs([]);
  addMsg('user',txt,false);
  showTyp();

  consultar(txt,function(err,resp){
    hideTyp();
    if(err){
      var loc=respostaLocal(txt);
      if(loc){
        setStatus(false,'Local');
        var d=document.createElement('div');d.className='msg lex';
        el('chat').appendChild(d);
        writer(d,loc,function(){
          busy=false;el('send').disabled=false;setSugs(getSugs(txt));
          hist.push({role:'model',parts:[{text:loc}]});
        });
      }else{
        setStatus(false,'Local');
        addMsg('lex','**Conexao temporariamente indisponivel.**\n\nDescreva os detalhes do seu caso — responderei com a legislacao local.\nTente novamente em instantes para uma analise mais completa.',false);
        busy=false;el('send').disabled=false;setSugs(S0);
      }
    }else{
      var d=document.createElement('div');d.className='msg lex';
      el('chat').appendChild(d);
      writer(d,resp,function(){
        busy=false;el('send').disabled=false;setSugs(getSugs(txt));
        hist.push({role:'model',parts:[{text:resp}]});
      });
    }
  });
}

window.addEventListener('DOMContentLoaded',function(){
  setTimeout(function(){el('spBtn').classList.add('show');},3000);
  var inp=el('inp');

});

if('serviceWorker' in navigator){

    navigator.serviceWorker.register('sw.js').catch(function(){});
  });
}

window.enviar=enviar;
})();
