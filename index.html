<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0a0a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Lex Mitio">
<meta name="description" content="Lex Mitio - Assistente Juridico com Gemini 2.5">
<link rel="manifest" href="manifest.json">
<title>Lex Mitio - Assistente Juridico</title>
<style>
:root{
  --bg:#07070d;--surface:#0f0f1a;--surface2:#141425;--border:#1e1e3a;
  --gold:#c9a84c;--gold2:#e8c97a;--gold3:#f5dfa0;
  --text:#e8e8f0;--text2:#9090b0;--danger:#e05555;
  --radius:14px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,-apple-system,sans-serif}

/* SPLASH */
#splash{position:fixed;inset:0;z-index:9999;background:radial-gradient(ellipse at 50% 40%,#0d0d22 0%,#07070d 70%);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;transition:opacity .7s,visibility .7s;}
#splash.hide{opacity:0;visibility:hidden;pointer-events:none}
.sp-scale{animation:sp-pulse 2.2s ease-in-out infinite}
@keyframes sp-pulse{0%,100%{transform:scale(1);filter:drop-shadow(0 0 10px rgba(201,168,76,.3))}50%{transform:scale(1.1);filter:drop-shadow(0 0 28px rgba(201,168,76,.9))}}
.sp-icon{font-size:76px}
.sp-name{font-size:38px;font-weight:900;letter-spacing:5px;color:var(--gold);text-transform:uppercase;text-shadow:0 0 30px rgba(201,168,76,.4)}
.sp-tagline{font-size:12px;color:var(--text2);letter-spacing:3px;text-transform:uppercase}
.sp-ring{width:180px;height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:4px}
.sp-ring-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2),var(--gold3));animation:ring-anim 2.8s ease-out forwards}
@keyframes ring-anim{from{width:0}to{width:100%}}
.sp-powered{font-size:11px;color:var(--text2);opacity:.6;letter-spacing:1px}
.sp-powered span{color:var(--gold2);font-weight:700}
.sp-btn{margin-top:6px;padding:15px 52px;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#07070d;border:none;border-radius:30px;cursor:pointer;font-size:16px;font-weight:800;letter-spacing:1px;box-shadow:0 4px 24px rgba(201,168,76,.5);transition:transform .2s,box-shadow .2s;display:none;}
.sp-btn:active{transform:scale(.97)}
.sp-btn.show{display:block;animation:fadeup .5s ease}
@keyframes fadeup{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

/* APP */
#app{display:none;flex-direction:column;height:100%;background:var(--bg);}
#app.show{display:flex}

/* TOPBAR */
.topbar{display:flex;align-items:center;gap:12px;padding:13px 18px;background:var(--surface);border-bottom:1px solid var(--border);box-shadow:0 2px 16px rgba(0,0,0,.4);flex-shrink:0;position:relative;z-index:10;}
.lx-logo{font-size:26px;filter:drop-shadow(0 0 8px rgba(201,168,76,.6))}
.brand{flex:1}
.brand-name{font-size:18px;font-weight:800;color:var(--gold);letter-spacing:2px}
.brand-sub{font-size:10px;color:var(--text2);letter-spacing:1.5px;margin-top:1px}
.ai-badge{display:flex;align-items:center;gap:5px;padding:4px 10px;background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.3);border-radius:12px;font-size:10px;color:var(--gold2);letter-spacing:.5px;font-weight:700}
.ai-dot{width:6px;height:6px;border-radius:50%;background:var(--gold2);animation:ai-pulse 1.8s ease-in-out infinite}
@keyframes ai-pulse{0%,100%{opacity:1;box-shadow:0 0 4px var(--gold2)}50%{opacity:.4;box-shadow:none}}
.ai-dot.off{background:#555;animation:none;box-shadow:none}

/* CHAT */
#chat{flex:1;overflow-y:auto;padding:16px 14px;display:flex;flex-direction:column;gap:14px;scroll-behavior:smooth;}
#chat::-webkit-scrollbar{width:3px}
#chat::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* MENSAGENS */
.msg{max-width:90%;padding:12px 16px;border-radius:var(--radius);line-height:1.65;font-size:14.5px;animation:msg-in .3s ease;}
@keyframes msg-in{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.msg.user{align-self:flex-end;background:linear-gradient(135deg,#181832,#1c1c40);border:1px solid #252555;border-bottom-right-radius:4px;}
.msg.bot{align-self:flex-start;background:var(--surface2);border:1px solid var(--border);border-bottom-left-radius:4px;}
.msg.err{border-color:#3a1515;background:#120808}
.msg-hd{display:flex;align-items:center;gap:6px;margin-bottom:7px;font-size:11px;font-weight:700;color:var(--gold);letter-spacing:1px}
.msg-hd::before{content:'LEX MITIO';font-size:10px}
.msg-ft{font-size:10.5px;color:var(--text2);margin-top:8px;opacity:.7}
.msg h2{font-size:15px;color:var(--gold2);margin:9px 0 4px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.msg h3{font-size:13.5px;color:var(--gold3);margin:7px 0 3px}
.msg ul{padding-left:18px;margin:5px 0}
.msg li{margin:3px 0}
.msg strong{color:var(--gold2)}
.msg code{background:#111128;padding:2px 7px;border-radius:4px;font-family:monospace;font-size:13px;color:var(--gold3)}
.msg a{color:var(--gold2)}
.msg p{margin:4px 0}

/* TYPING */
.typing{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);border-bottom-left-radius:4px;align-self:flex-start;animation:msg-in .3s ease;}
.typing-dots{display:flex;gap:5px}
.typing-dots span{width:7px;height:7px;border-radius:50%;background:var(--gold);animation:tdot 1.4s infinite}
.typing-dots span:nth-child(2){animation-delay:.2s}
.typing-dots span:nth-child(3){animation-delay:.4s}
@keyframes tdot{0%,80%,100%{transform:scale(.7);opacity:.3}40%{transform:scale(1.1);opacity:1}}
.typing-txt{font-size:12px;color:var(--text2)}

/* SUGESTOES */
#sugs{display:flex;flex-wrap:wrap;gap:8px;padding:8px 14px 4px;flex-shrink:0;}
.sug{padding:7px 14px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer;font-size:12.5px;transition:all .2s;white-space:nowrap;}
.sug:hover,.sug:active{border-color:var(--gold);color:var(--gold);background:rgba(201,168,76,.07)}

/* INPUT */
.input-wrap{display:flex;align-items:flex-end;gap:10px;padding:11px 14px 13px;background:var(--surface);border-top:1px solid var(--border);flex-shrink:0;}
#inp{flex:1;padding:11px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:22px;color:var(--text);font-size:14.5px;resize:none;max-height:120px;font-family:inherit;line-height:1.5;transition:border-color .2s;outline:none;}
#inp:focus{border-color:var(--gold)}
#inp::placeholder{color:var(--text2)}
#send{width:44px;height:44px;border-radius:50%;border:none;cursor:pointer;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#07070d;font-size:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .2s,opacity .2s;box-shadow:0 2px 12px rgba(201,168,76,.35);}
#send:active{transform:scale(.93)}
#send:disabled{opacity:.35;cursor:default;transform:none}

/* WELCOME */
.welcome{align-self:center;text-align:center;padding:28px 22px;margin:auto;background:var(--surface);border:1px solid var(--border);border-radius:20px;max-width:310px;width:100%;}
.welcome .ico{font-size:54px;display:block;margin-bottom:14px}
.welcome h2{color:var(--gold);font-size:21px;margin-bottom:6px;letter-spacing:1px}
.welcome p{color:var(--text2);font-size:13px;line-height:1.7;margin-bottom:14px}
.areas{display:flex;flex-wrap:wrap;gap:7px;justify-content:center}
.area{padding:5px 12px;border:1px solid var(--border);border-radius:12px;font-size:11.5px;color:var(--text2);background:var(--surface2)}

/* OFFLINE BANNER */
#offbanner{background:#180e00;border-bottom:1px solid #3a2800;color:#c09040;font-size:12px;text-align:center;padding:5px 10px;display:none;flex-shrink:0;}
#offbanner.show{display:block}

/* TOAST */
.toast{position:fixed;bottom:85px;left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--border);padding:9px 20px;border-radius:20px;font-size:13px;z-index:1000;pointer-events:none;box-shadow:0 4px 20px rgba(0,0,0,.5);animation:fadeup .3s ease}

@media(min-width:600px){#app{max-width:480px;margin:0 auto;height:100vh;border-left:1px solid var(--border);border-right:1px solid var(--border)}}
</style>
</head>

function respostaLocal(q){
  var l=q.toLowerCase();
  for(var p in LB){if(new RegExp('('+p+')','i').test(l))return LB[p](q);}
  return null;
}

/* ── HELPERS UI ───────────────────────────────────────────────── */
function el(id){return document.getElementById(id);}
function qs(sel){return document.querySelector(sel);}
function agora(){var n=new Date();return n.getHours().toString().padStart(2,'0')+':'+n.getMinutes().toString().padStart(2,'0');}
function toast(msg){var t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);setTimeout(function(){t.remove();},2500);}

function setAI(ok,label){
  geminiAtivo=ok;
  el('aiDot').className='ai-dot'+(ok?'':' off');
  el('aiLabel').textContent=label||'Gemini 2.5';
  el('offbanner').className=ok?'':'show';
}

function renderMD(t){
  if(!t)return '';
  return t
    .replace(/^## (.+)$/gm,'<h2>$1</h2>')
    .replace(/^### (.+)$/gm,'<h3>$1</h3>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/`(.+?)`/g,'<code>$1</code>')
    .replace(/^- (.+)$/gm,'<li>$1</li>')
    .replace(/(<li>[\s\S]+?<\/li>)+/g,'<ul>$&</ul>')
    .replace(/\n\n/g,'<p></p>')
    .replace(/\n/g,'<br>');
}

function addMsg(role,txt,isHtml){
  var c=el('chat');
  var d=document.createElement('div');
  d.className='msg '+(role==='user'?'user':'bot');
  if(role==='bot'){
    d.innerHTML='<div class="msg-hd"></div>'+(isHtml?txt:renderMD(txt))+'<div class="msg-ft">'+agora()+'</div>';
  }else{
    var sp=document.createElement('span');sp.textContent=txt;
    var ft=document.createElement('div');ft.className='msg-ft';ft.textContent=agora();
    d.appendChild(sp);d.appendChild(ft);
  }
  c.appendChild(d);
  c.scrollTop=c.scrollHeight;
  if(hist.length<24)hist.push({role:role==='user'?'user':'model',parts:[{text:txt}]});
  return d;
}

function showTyping(){
  var c=el('chat');
  var d=document.createElement('div');d.className='typing';d.id='typ';
  d.innerHTML='<div class="typing-dots"><span></span><span></span><span></span></div><div class="typing-txt">Analisando...</div>';
  c.appendChild(d);c.scrollTop=c.scrollHeight;
}
function hideTyping(){var e=el('typ');if(e)e.remove();}

function setSugs(arr){
  var b=el('sugs');b.innerHTML='';
  if(!arr||!arr.length)return;
  arr.forEach(function(s){
    var btn=document.createElement('button');
    btn.className='sug';btn.textContent=s;
    btn.onclick=function(){el('inp').value=s;enviar();};
    b.appendChild(btn);
  });
}

var SUGS_INIT=['Fui demitido, quais meus direitos?','Como pedir aposentadoria?','Produto com defeito — o que fazer?','Acidente de trabalho, e agora?'];
var SUGS_TRAB=['FGTS nao depositado, como cobrar?','Tenho direito a insalubridade?','Justa causa pode ser contestada?'];
var SUGS_CONS=['Plano de saude negou cobertura','Cobranca indevida no cartao','Produto nao entregue — quais direitos?'];
var SUGS_FAM=['Como pedir pensao alimenticia?','Guarda compartilhada como funciona?','Divorcio amigavel precisa de advogado?'];
function getSugs(q){
  if(!q)return SUGS_INIT;
  var l=q.toLowerCase();
  if(/trabalho|emprego|clt|salario|demitido|fgts/.test(l))return SUGS_TRAB;
  if(/consumid|produto|plano|cartao|compra/.test(l))return SUGS_CONS;
  if(/familia|divorcio|filho|pensao|guarda/.test(l))return SUGS_FAM;
  return SUGS_INIT.slice(0,3);
}

/* ── TYPEWRITER ───────────────────────────────────────────────── */
function typewriter(el,txt,done){
  var rendered=renderMD(txt);
  var hd='<div class="msg-hd"></div>';
  var ft='<div class="msg-ft">'+agora()+'</div>';
  if(rendered.length>700){
    el.innerHTML=hd+rendered+ft;
    document.getElementById('chat').scrollTop=9999;
    if(done)done();return;
  }
  var plain=rendered.replace(/<[^>]+>/g,'');
  el.innerHTML=hd+'<span id="twc"></span>'+ft;
  var tw=document.getElementById('twc');
  var i=0;var chat=document.getElementById('chat');
  var speed=plain.length>400?7:13;
  function step(){
    if(i<plain.length){
      tw.textContent+=plain[i++];
      chat.scrollTop=9999;
      setTimeout(step,speed);
    }else{
      el.innerHTML=hd+rendered+ft;
      chat.scrollTop=9999;
      if(done)done();
    }
  }
  step();
}

/* ── CHAMAR GEMINI (com rotacao automatica de modelos) ─────────── */
function chamarGemini(pergunta,cb){
  var msgs=[
    {role:'user',parts:[{text:SYS}]},
    {role:'model',parts:[{text:'Pronto. Sou Lex Mitio, assistente juridico. Pode perguntar.'}]}
  ];
  hist.forEach(function(m){msgs.push(m);});

  function tentar(idx){
    var model=MODELS[idx]||MODELS[0];
    var url='https://generativelanguage.googleapis.com/v1beta/models/'+model+':generateContent?key='+K;
    var xhr=new XMLHttpRequest();
    xhr.open('POST',url,true);
    xhr.setRequestHeader('Content-Type','application/json');
    xhr.timeout=25000;

    xhr.onreadystatechange=function(){
      if(xhr.readyState!==4)return;
      if(xhr.status===200){
        try{
          var d=JSON.parse(xhr.responseText);
          var txt=d.candidates[0].content.parts[0].text;
          setAI(true,model==='gemini-2.5-flash'?'Gemini 2.5':'Gemini '+model.replace('gemini-','').replace('-flash',''));
          cb(null,txt);
        }catch(e){cb(e,null);}
      }else if(xhr.status===429){
        /* Tentar proximo modelo */
        if(idx+1<MODELS.length){
          setTimeout(function(){tentar(idx+1);},1500);
        }else{
          cb({quota:true},null);
        }
      }else{
        if(idx+1<MODELS.length){
          setTimeout(function(){tentar(idx+1);},1000);
        }else{
          cb(new Error('HTTP '+xhr.status),null);
        }
      }
    };
    xhr.ontimeout=function(){
      if(idx+1<MODELS.length){setTimeout(function(){tentar(idx+1);},500);}
      else{cb(new Error('timeout'),null);}
    };
    xhr.onerror=function(){cb(new Error('network'),null);};

    xhr.send(JSON.stringify({
      contents:msgs,
      generationConfig:{temperature:0.75,maxOutputTokens:1500},
      safetySettings:[
        {category:'HARM_CATEGORY_HARASSMENT',threshold:'BLOCK_NONE'},
        {category:'HARM_CATEGORY_HATE_SPEECH',threshold:'BLOCK_NONE'},
        {category:'HARM_CATEGORY_SEXUALLY_EXPLICIT',threshold:'BLOCK_NONE'},
        {category:'HARM_CATEGORY_DANGEROUS_CONTENT',threshold:'BLOCK_NONE'}
      ]
    }));
  }
  tentar(0);
}

/* ── ENVIAR MENSAGEM ──────────────────────────────────────────── */
function enviar(){
  var inp=el('inp');
  var txt=inp.value.trim();
  if(!txt||busy)return;
  inp.value='';inp.style.height='auto';
  busy=true;el('send').disabled=true;setSugs([]);

  addMsg('user',txt,false);
  showTyping();

  chamarGemini(txt,function(err,resp){
    hideTyping();
    if(err){
      var local=respostaLocal(txt);
      if(local){
        setAI(false,'Base Local');
        var d=document.createElement('div');d.className='msg bot';el('chat').appendChild(d);
        typewriter(d,local,function(){
          busy=false;el('send').disabled=false;setSugs(getSugs(txt));
          hist.push({role:'model',parts:[{text:local}]});
        });
      }else{
        setAI(false,'Offline');
        var msg=err.quota?
          '**Gemini temporariamente indisponivel**\n\nPosso ajudar agora com base juridica local sobre:\nCLT, FGTS, INSS, CDC, Familia, Aluguel, Penal, LGPD e mais.\n\nTente uma dessas perguntas acima.':
          '**Sem conexao no momento**\n\nVerifique sua internet e tente novamente, ou pergunte sobre os temas da base local.';
        addMsg('bot',msg,false);
        busy=false;el('send').disabled=false;setSugs(SUGS_INIT);
      }
    }else{
      var d=document.createElement('div');d.className='msg bot';el('chat').appendChild(d);
      typewriter(d,resp,function(){
        busy=false;el('send').disabled=false;setSugs(getSugs(txt));
        hist.push({role:'model',parts:[{text:resp}]});
      });
    }
  });
}
