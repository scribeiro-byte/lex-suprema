<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#07070d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Lex Mitio">
<meta name="description" content="Lex Mitio — Inteligencia Juridica Suprema">
<link rel="manifest" href="manifest.json">

<style>
:root{
  --bg:#07070d;--s1:#0c0c18;--s2:#111120;--s3:#161628;
  --bd:#1a1a30;--bd2:#222240;
  --gold:#c9a84c;--gold2:#e8c97a;--gold3:#f5e4b0;
  --text:#dcdcee;--text2:#8888a8;--text3:#5555777;
  --danger:#c05050;--ok:#4a9a60;
  --r:14px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,-apple-system,sans-serif;font-size:15px}

/* ── SPLASH ── */
#splash{
  position:fixed;inset:0;z-index:9999;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;
  background:radial-gradient(ellipse at 50% 35%,#10102a 0%,#07070d 65%);
  transition:opacity .8s ease, visibility .8s ease;
}
#splash.hide{opacity:0;visibility:hidden;pointer-events:none}
.sp-emblem{
  position:relative;width:100px;height:100px;
  display:flex;align-items:center;justify-content:center;
}
.sp-ring{
  position:absolute;inset:0;border-radius:50%;
  border:2px solid transparent;
  background:linear-gradient(var(--bg),var(--bg)) padding-box,
             conic-gradient(from 0deg,var(--gold) 0%,transparent 60%) border-box;
  animation:sp-spin 3s linear infinite;
}
@keyframes sp-spin{to{transform:rotate(360deg)}}
.sp-ring2{
  position:absolute;inset:8px;border-radius:50%;
  border:1px solid rgba(201,168,76,.2);
  animation:sp-spin 6s linear infinite reverse;
}
.sp-ico{font-size:48px;filter:drop-shadow(0 0 16px rgba(201,168,76,.7))}
.sp-name{
  font-size:34px;font-weight:900;letter-spacing:8px;
  color:transparent;
  background:linear-gradient(135deg,var(--gold),var(--gold2),var(--gold3),var(--gold2));
  -webkit-background-clip:text;background-clip:text;
  text-transform:uppercase;
  text-shadow:none;
  filter:drop-shadow(0 0 20px rgba(201,168,76,.3));
}
.sp-line{width:1px;height:40px;background:linear-gradient(to bottom,transparent,var(--gold),transparent)}
.sp-tagline{font-size:11px;color:var(--text2);letter-spacing:4px;text-transform:uppercase}
.sp-progress{
  width:160px;height:2px;background:var(--bd);border-radius:1px;overflow:hidden;
  position:relative;margin-top:4px;
}
.sp-bar{
  position:absolute;left:0;top:0;height:100%;width:0;
  background:linear-gradient(90deg,var(--gold),var(--gold2));
  animation:sp-load 3s cubic-bezier(.4,0,.2,1) forwards;
}
@keyframes sp-load{to{width:100%}}
.sp-btn{
  margin-top:8px;padding:13px 44px;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:#07070d;border:none;border-radius:28px;cursor:pointer;
  font-size:15px;font-weight:900;letter-spacing:2px;text-transform:uppercase;
  box-shadow:0 0 0 0 rgba(201,168,76,.4);
  transition:box-shadow .3s,transform .2s;
  display:none;
}
.sp-btn.show{display:block;animation:sp-btn-in .6s ease}
@keyframes sp-btn-in{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.sp-btn:hover{box-shadow:0 0 24px rgba(201,168,76,.5);transform:translateY(-2px)}
.sp-btn:active{transform:scale(.96)}

/* ── APP ── */
#app{display:none;flex-direction:column;height:100%}
#app.show{display:flex}

/* ── TOPBAR ── */
.topbar{
  display:flex;align-items:center;gap:12px;
  padding:12px 16px;
  background:var(--s1);
  border-bottom:1px solid var(--bd);
  flex-shrink:0;
}
.tb-ico{font-size:24px;filter:drop-shadow(0 0 6px rgba(201,168,76,.5))}
.tb-info{flex:1}
.tb-name{font-size:17px;font-weight:900;letter-spacing:3px;color:var(--gold);text-transform:uppercase}
.tb-sub{font-size:9.5px;color:var(--text2);letter-spacing:2px;text-transform:uppercase;margin-top:1px}
.tb-status{
  display:flex;align-items:center;gap:6px;
  padding:5px 10px;
  border:1px solid var(--bd2);
  border-radius:20px;
  background:rgba(201,168,76,.05);
}
.tb-dot{
  width:6px;height:6px;border-radius:50%;
  background:var(--gold2);
  box-shadow:0 0 6px var(--gold2);
  animation:tb-pulse 2s ease-in-out infinite;
}
@keyframes tb-pulse{0%,100%{opacity:1}50%{opacity:.3}}
.tb-dot.off{background:#444;box-shadow:none;animation:none}
.tb-lbl{font-size:10px;color:var(--text2);letter-spacing:.5px}

/* ── OFFLINE ── */
#offbar{
  background:#100a00;border-bottom:1px solid #2a1800;
  color:#a07030;font-size:11.5px;text-align:center;padding:5px;
  display:none;flex-shrink:0;letter-spacing:.5px;
}
#offbar.on{display:block}

/* ── CHAT ── */
#chat{
  flex:1;overflow-y:auto;
  padding:16px 14px;
  display:flex;flex-direction:column;gap:16px;
  scroll-behavior:smooth;
}
#chat::-webkit-scrollbar{width:3px}
#chat::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px}

/* ── MSGS ── */
.msg{
  max-width:91%;
  padding:13px 16px;border-radius:var(--r);
  line-height:1.7;font-size:14px;
  animation:msg-in .35s ease;
}
@keyframes msg-in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.msg.user{
  align-self:flex-end;
  background:linear-gradient(135deg,#141430,#181840);
  border:1px solid #20205a;
  border-bottom-right-radius:4px;
}
.msg.lex{
  align-self:flex-start;
  background:var(--s2);
  border:1px solid var(--bd);
  border-bottom-left-radius:4px;
}
.msg.err{background:#0e0808;border-color:#2a1010}

/* Cabecalho da msg lex */
.lex-hd{
  display:flex;align-items:center;gap:8px;
  margin-bottom:10px;
  padding-bottom:8px;
  border-bottom:1px solid var(--bd);
}
.lex-hd-name{
  font-size:10px;font-weight:900;
  color:var(--gold);letter-spacing:2px;text-transform:uppercase;
}
.lex-hd-ico{font-size:14px;opacity:.8}
.msg-time{font-size:10px;color:var(--text2);margin-top:8px;opacity:.6}

/* Markdown */
.msg h2{font-size:14.5px;color:var(--gold2);margin:12px 0 6px;padding-bottom:5px;border-bottom:1px solid var(--bd)}
.msg h3{font-size:13.5px;color:var(--gold3);margin:9px 0 4px}
.msg ul{padding-left:18px;margin:6px 0}
.msg ol{padding-left:20px;margin:6px 0}
.msg li{margin:4px 0;line-height:1.6}
.msg strong{color:var(--gold2)}
.msg em{color:var(--gold3);font-style:italic}
.msg code{background:#0a0a1a;padding:2px 7px;border-radius:5px;font-family:'Courier New',monospace;font-size:12.5px;color:var(--gold3);border:1px solid var(--bd)}
.msg blockquote{border-left:3px solid var(--gold);padding:8px 14px;margin:8px 0;background:rgba(201,168,76,.06);border-radius:0 8px 8px 0;font-style:italic;color:var(--text2)}
.msg a{color:var(--gold2);text-decoration:none}
.msg hr{border:none;border-top:1px solid var(--bd);margin:12px 0}

/* ── TYPING ── */
.typing{
  display:flex;align-items:center;gap:10px;
  padding:13px 16px;
  background:var(--s2);border:1px solid var(--bd);
  border-radius:var(--r);border-bottom-left-radius:4px;
  align-self:flex-start;animation:msg-in .3s ease;
}
.t-dots{display:flex;gap:5px}
.t-dots span{
  width:7px;height:7px;border-radius:50%;
  background:var(--gold);
  animation:td 1.4s ease-in-out infinite;
}
.t-dots span:nth-child(2){animation-delay:.2s}
.t-dots span:nth-child(3){animation-delay:.4s}
@keyframes td{0%,80%,100%{transform:scale(.65);opacity:.25}40%{transform:scale(1.15);opacity:1}}
.t-txt{font-size:11px;color:var(--text2);letter-spacing:.5px}

/* ── SUGESTOES ── */
#sugs{
  display:flex;flex-wrap:wrap;gap:7px;
  padding:6px 14px 4px;flex-shrink:0;
}
.sug{
  padding:7px 13px;border-radius:18px;
  border:1px solid var(--bd2);background:var(--s1);
  color:var(--text2);cursor:pointer;font-size:12px;
  transition:all .2s;white-space:nowrap;
}
.sug:hover,.sug:active{border-color:var(--gold);color:var(--gold);background:rgba(201,168,76,.06)}

/* ── INPUT ── */
.input-area{
  display:flex;align-items:flex-end;gap:9px;
  padding:10px 14px 13px;
  background:var(--s1);border-top:1px solid var(--bd);
  flex-shrink:0;
}
#inp{
  flex:1;padding:11px 16px;
  background:var(--s2);border:1px solid var(--bd);
  border-radius:20px;color:var(--text);
  font-size:14px;resize:none;max-height:120px;
  font-family:inherit;line-height:1.5;
  transition:border-color .2s;outline:none;
}
#inp:focus{border-color:rgba(201,168,76,.5)}
#inp::placeholder{color:var(--text2)}
#send{
  width:44px;height:44px;border-radius:50%;border:none;cursor:pointer;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:#07070d;font-size:19px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:transform .2s,opacity .2s;
  box-shadow:0 2px 14px rgba(201,168,76,.3);
}
#send:active{transform:scale(.91)}
#send:disabled{opacity:.3;cursor:default;transform:none}

/* ── WELCOME ── */
.welcome{
  align-self:center;text-align:center;
  padding:30px 22px;margin:auto;
  background:var(--s1);border:1px solid var(--bd);
  border-radius:20px;max-width:300px;width:100%;
}
.wlc-ico{font-size:50px;display:block;margin-bottom:14px;filter:drop-shadow(0 0 10px rgba(201,168,76,.5))}
.wlc-name{
  font-size:22px;font-weight:900;letter-spacing:4px;
  color:var(--gold);margin-bottom:4px;text-transform:uppercase;
}
.wlc-line{width:40px;height:1px;background:var(--gold);margin:8px auto 12px;opacity:.5}
.wlc-txt{color:var(--text2);font-size:13px;line-height:1.7}
.wlc-areas{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-top:16px}
.wlc-tag{padding:4px 11px;border:1px solid var(--bd2);border-radius:10px;font-size:11px;color:var(--text2)}

@media(min-width:600px){#app{max-width:460px;margin:0 auto;height:100vh;border-left:1px solid var(--bd);border-right:1px solid var(--bd)}}
</style>
</head>

function respostaLocal(q){
  var l=q.toLowerCase();
  for(var p in EB){if(new RegExp('('+p+')','i').test(l))return EB[p](q);}
  return null;
}

/* ── HELPERS UI ──────────────────────────────────────── */
function el(id){return document.getElementById(id);}
function now(){var d=new Date();return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');}

function setStatus(on,lbl){
  el('tbDot').className='tb-dot'+(on?'':' off');
  el('tbLbl').textContent=lbl||'Ativo';
  el('offbar').className=on?'':'on';
}

function md(t){
  if(!t)return '';
  return t
    .replace(/^---$/gm,'<hr>')
    .replace(/^## (.+)$/gm,'<h2>$1</h2>')
    .replace(/^### (.+)$/gm,'<h3>$1</h3>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/`(.+?)`/g,'<code>$1</code>')
    .replace(/^> (.+)$/gm,'<blockquote>$1</blockquote>')
    .replace(/^- (.+)$/gm,'<li>$1</li>')
    .replace(/(<li>[\s\S]+?<\/li>)+/g,'<ul>$&</ul>')
    .replace(/^\d+\. (.+)$/gm,'<li>$1</li>')
    .replace(/\n\n/g,'<p></p>')
    .replace(/\n/g,'<br>');
}

function addMsg(role,txt,isHtml){
  var c=el('chat'),d=document.createElement('div');
  d.className='msg '+(role==='user'?'user':'lex');
  if(role!=='user'){
    d.innerHTML='<div class="lex-hd"><span class="lex-hd-ico">&#9878;&#65039;</span><span class="lex-hd-name">Lex Mitio</span></div>'+(isHtml?txt:md(txt))+'<div class="msg-time">'+now()+'</div>';
  }else{
    var s=document.createElement('span');s.textContent=txt;
    var ft=document.createElement('div');ft.className='msg-time';ft.textContent=now();
    d.appendChild(s);d.appendChild(ft);
  }
  c.appendChild(d);c.scrollTop=c.scrollHeight;
  if(hist.length<30)hist.push({role:role==='user'?'user':'model',parts:[{text:txt}]});
  return d;
}

function showTyp(){
  var c=el('chat'),d=document.createElement('div');
  d.className='typing';d.id='typ';
  d.innerHTML='<div class="t-dots"><span></span><span></span><span></span></div><div class="t-txt">Analisando o caso...</div>';
  c.appendChild(d);c.scrollTop=c.scrollHeight;
}
function hideTyp(){var e=el('typ');if(e)e.remove();}

function setSugs(arr){
  var b=el('sugs');b.innerHTML='';
  if(!arr||!arr.length)return;
  arr.forEach(function(s){
    var btn=document.createElement('button');btn.className='sug';btn.textContent=s;
    btn.onclick=function(){el('inp').value=s;enviar();};
    b.appendChild(btn);
  });
}
var S0=['Fui demitido, o que tenho direito?','Justa causa pode ser contestada?','Como cobrar horas extras nao pagas?','Produto com defeito — quais brechas?'];
var S1=['FGTS nao depositado como cobrar?','Rescisao indireta como funciona?','Cargo de confianca tem direito a extra?'];
var S2=['Plano negou procedimento, o que fazer?','Cobranca indevida — tenho direito a dobro?','Clausulas abusivas no contrato'];
var S3=['Pensao alimenticia nao paga — prisao?','Guarda unilateral pode ser mudada?','Alienacao parental como provar?'];
function getSugs(q){
  if(!q)return S0;
  var l=q.toLowerCase();
  if(/trabalho|emprego|salario|clt|demitido|fgts/.test(l))return S1;
  if(/consumid|produto|plano|cartao/.test(l))return S2;
  if(/familia|divorcio|pensao|guarda|filho/.test(l))return S3;
  return S0.slice(0,3);
}

/* ── TYPEWRITER ─────────────────────────────────────── */
function writer(el,txt,done){
  var rendered=md(txt);
  var hd='<div class="lex-hd"><span class="lex-hd-ico">&#9878;&#65039;</span><span class="lex-hd-name">Lex Mitio</span></div>';
  var ft='<div class="msg-time">'+now()+'</div>';
  if(rendered.length>900){
    el.innerHTML=hd+rendered+ft;
    document.getElementById('chat').scrollTop=9999;
    if(done)done();return;
  }
  var plain=rendered.replace(/<[^>]+>/g,'').replace(/&[a-z]+;/g,' ');
  el.innerHTML=hd+'<span id="twc"></span>'+ft;
  var tw=document.getElementById('twc'),i=0;
  var ch=document.getElementById('chat');
  var spd=plain.length>500?6:11;
  function step(){
    if(i<plain.length){tw.textContent+=plain[i++];ch.scrollTop=9999;setTimeout(step,spd);}
    else{el.innerHTML=hd+rendered+ft;ch.scrollTop=9999;if(done)done();}
  }
  step();
}

/* ── CHAMADA GEMINI (cascata de modelos) ─────────────── */
function chamar(q,cb){
  var msgs=[
    {role:'user',parts:[{text:P}]},
    {role:'model',parts:[{text:'Entendido. Sou Lex Mitio. O direito em forma de voz. Pode falar — analisarei cada detalhe.'}]}
  ];
  hist.forEach(function(m){msgs.push(m);});

  function try_(i){
    if(i>=MODELOS.length){cb({quota:true},null);return;}
    var url=BASE+MODELOS[i]+':generateContent?key='+K;
    var xhr=new XMLHttpRequest();
    xhr.open('POST',url,true);
    xhr.setRequestHeader('Content-Type','application/json');
    xhr.timeout=28000;
    xhr.onreadystatechange=function(){
      if(xhr.readyState!==4)return;
      if(xhr.status===200){
        try{
          var d=JSON.parse(xhr.responseText);
          var t=d.candidates[0].content.parts[0].text;
          var lbl=MODELOS[i]==='gemini-2.5-flash'?'Ativo':'Ativo';
          setStatus(true,lbl);
          cb(null,t);
        }catch(e){try_(i+1);}
      }else if(xhr.status===429){
        setTimeout(function(){try_(i+1);},800);
      }else{
        setTimeout(function(){try_(i+1);},500);
      }
    };
    xhr.ontimeout=function(){try_(i+1);};
    xhr.onerror=function(){cb(new Error('network'),null);};
    xhr.send(JSON.stringify({
      contents:msgs,
      generationConfig:{temperature:0.82,maxOutputTokens:2000,topP:0.95},
      safetySettings:[
        {category:'HARM_CATEGORY_HARASSMENT',threshold:'BLOCK_NONE'},
        {category:'HARM_CATEGORY_HATE_SPEECH',threshold:'BLOCK_NONE'},
        {category:'HARM_CATEGORY_SEXUALLY_EXPLICIT',threshold:'BLOCK_NONE'},
        {category:'HARM_CATEGORY_DANGEROUS_CONTENT',threshold:'BLOCK_NONE'}
      ]
    }));
  }
  try_(0);
}

/* ── ENVIAR ──────────────────────────────────────────── */
function enviar(){
  var inp=el('inp'),txt=inp.value.trim();
  if(!txt||busy)return;
  inp.value='';inp.style.height='auto';
  busy=true;el('send').disabled=true;setSugs([]);
  addMsg('user',txt,false);
  showTyp();

  chamar(txt,function(err,resp){
    hideTyp();
    if(err){
      var loc=respostaLocal(txt);
      if(loc){
        setStatus(false,'Local');
        var d=document.createElement('div');d.className='msg lex';
        el('chat').appendChild(d);
        writer(d,loc,function(){
          busy=false;el('send').disabled=false;setSugs(getSugs(txt));
          hist.push({role:'model',parts:[{text:loc}]});
        });
      }else{
        setStatus(false,'Aguardando');
        addMsg('lex','**Conexao temporariamente indisponivel.**\n\nDescreva seu caso e responderei com a base juridica local.\nOu tente novamente em instantes.',false);
        busy=false;el('send').disabled=false;setSugs(S0);
      }
    }else{
      var d=document.createElement('div');d.className='msg lex';
      el('chat').appendChild(d);
      writer(d,resp,function(){
        busy=false;el('send').disabled=false;setSugs(getSugs(txt));
        hist.push({role:'model',parts:[{text:resp}]});
      });
    }
  });
}

window.addEventListener('DOMContentLoaded',function(){
  setTimeout(function(){el('spBtn').classList.add('show');},3000);

  window.addEventListener('load',function(){navigator.serviceWorker.register('sw.js').catch(function(){});});
}
window.entrarApp=entrarApp;
window.enviar=enviar;
