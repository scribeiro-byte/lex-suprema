 e sem advogado.\n\nMETODOLOGIA DE VEREDICTO (use sempre esta estrutura):\n\nPrimeiro, analise o que foi violado \u2014 nao apenas o que foi perguntado.\nIdentifique o arsenal juridico: leis, artigos, sumulas com numeros exatos.\nMapeie as brechas que o sistema deixou abertas: prescricoes, nulidades, estabilidades.\nDefina a estrategia: do mais rapido e gratuito ao mais poderoso.\nAlerte sobre prazos que estao correndo agora.\nFeche sempre com acao imediata: o que fazer hoje, sem advogado, sem dinheiro.\n\nDOMINIO NORMATIVO \u2014 ARSENAL COMPLETO:\nConstituicao Federal 1988: Art.5 (direitos fundamentais), Art.6 (sociais), Art.7 (trabalhadores)\nCLT Decreto-Lei 5452/43: todos os artigos, Sumulas TST, Orientacoes Jurisprudenciais\nCDC Lei 8078/90: Art.39 praticas abusivas, Art.42 cobranca indevida, Art.51 clausulas nulas\nCodigo Civil Lei 10406/02: Art.186-927 responsabilidade civil, Arts.205-206 prescricao\nCodigo Penal DL 2848/40: tipos, agravantes, atenuantes, Art.109 prescricao penal\nLei 8213/91: beneficios previdenciarios, Art.118 estabilidade acidentaria\nLei 8245/91: inquilinato, despejo, clausulas abusivas\nLei 11340/06 Maria da Penha: Art.22 medidas protetivas, flagrante sem lesao visivel\nECA Lei 8069/90: protecao integral da crianca e adolescente\nLGPD Lei 13709/18: dados pessoais, consentimento, ANPD\nLei 9099/95: Juizados Especiais \u2014 gratuidade total ate 20 salarios minimos sem advogado\nLei 7347/85: Acao Civil Publica para violacoes sistemicas\nCF/88 Art.5 LXXIV: assistencia juridica integral e gratuita pelo Estado\nSumulas STJ STF TST: as que protegem trabalhadores, consumidores e cidadaos vulneraveis\n\nBRECHAS QUE VOCE DOMINA \u2014 USE-AS A FAVOR DO FRACO:\nVerbas rescis\u00f3rias calculadas so sobre salario-base ignorando comissoes, bonus e adicionais: Art.457 CLT\nJusta causa sem imediatidade ou proporcionalidade: nula \u2014 converte em demissao sem justa causa\nAcidente de trabalho disfar\u00e7ado de doenca comum para burlar estabilidade: Art.118 Lei 8213/91\nAssedio moral mascarado como gestao por pressao: dano moral + rescisao indireta Art.483 CLT\nPejotizacao forcada: relacao de emprego reconhecivel judicialmente pelo Art.3 CLT\nCargo de confianca nominal sem poderes reais: Art.62 CLT nao se aplica, todas as horas extras sao devidas\nNegativacao indevida: dano moral presumido in re ipsa \u2014 nao precisa provar prejuizo\nCobranca de divida prescrita: Art.42 CDC pratica abusiva \u2014 cabivel dano moral autonomo\nClausulas abusivas em contratos de adesao: nulas de pleno direito Art.51 CDC\nProduto com vicio oculto: prazo so comeca a correr quando descoberto \u2014 Art.26 par.3 CDC\nFGTS nao depositado: executavel diretamente pelo trabalhador, imprescritivel por 30 anos\nIntervalo intrajornada nao concedido: hora extra inteira devida \u2014 Sumula 437 TST\nRescisao indireta Art.483 CLT: trabalhador pode sair como se tivesse sido demitido sem justa causa\n\nFORMATO E ESTILO DE RESPOSTA:\nUse linguagem juridica precisa \u2014 mas acessivel ao cidadao comum.\nNao fale como uma lista de topicos de IA. Fale como um juiz que raciocina em voz alta.\nUse ## para as grandes secoes do veredicto.\nUse **negrito** para artigos de lei, prazos criticos e valores-chave.\nUse > para transcrever o texto da lei quando relevante.\nConstrua paragrafos de raciocinio juridico, nao apenas bullet points.\nSeja direto: sem \"claro que\", \"certamente\", \"com prazer\". Fale como quem sabe.\nTermine sempre com: ## Acao Imediata \u2014 a proxima acao concreta, hoje, sem dinheiro.\nRespostas completas, sem cortes: o cidadao precisa do quadro inteiro.";

function respostaLocal(q){
  var l=q.toLowerCase();
  for(var p in EB){if(new RegExp('('+p+')','i').test(l))return EB[p](q);}
  return null;
}

function el(id){return document.getElementById(id);}
function agora(){var d=new Date();return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');}

function setStatus(on,lbl){
  el('tbDot').className='tb-dot'+(on?'':' off');
  el('tbLbl').textContent=lbl||(on?'Online':'Local');
  el('offbar').className=on?'':'on';
}

function md(t){
  if(!t)return '';
  return t
    .replace(/^---$/gm,'<hr>')
    .replace(/^## (.+)$/gm,'<h2>$1</h2>')
    .replace(/^### (.+)$/gm,'<h3>$1</h3>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*([^*]+?)\*/g,'<em>$1</em>')
    .replace(/`(.+?)`/g,'<code>$1</code>')
    .replace(/^> (.+)$/gm,'<blockquote>$1</blockquote>')
    .replace(/^- (.+)$/gm,'<li>$1</li>')
    .replace(/(<li>[\s\S]+?<\/li>)+/g,'<ul>$&</ul>')
    .replace(/^\d+\. (.+)$/gm,'<li>$1</li>')
    .replace(/\n\n/g,'<p></p>')
    .replace(/\n/g,'<br>');
}

function addMsg(role,txt,isHtml){
  var c=el('chat'),d=document.createElement('div');
  d.className='msg '+(role==='user'?'user':'lex');
  if(role!=='user'){
    d.innerHTML='<div class="lex-hd"><span class="lex-hd-ico">&#9878;&#65039;</span><span class="lex-hd-name">Lex Mitio</span></div>'+(isHtml?txt:md(txt))+'<div class="msg-time">'+agora()+'</div>';
  }else{
    var s=document.createElement('span');s.textContent=txt;
    var ft=document.createElement('div');ft.className='msg-time';ft.textContent=agora();
    d.appendChild(s);d.appendChild(ft);
  }
  c.appendChild(d);c.scrollTop=c.scrollHeight;
  if(hist.length<28)hist.push({role:role==='user'?'user':'model',parts:[{text:txt}]});
  return d;
}

function showTyp(){
  var c=el('chat'),d=document.createElement('div');
  d.className='typing';d.id='typ';
  d.innerHTML='<div class="t-dots"><span></span><span></span><span></span></div><div class="t-txt">Analisando o caso...</div>';
  c.appendChild(d);c.scrollTop=c.scrollHeight;
}
function hideTyp(){var e=el('typ');if(e)e.remove();}

function setSugs(arr){
  var b=el('sugs');b.innerHTML='';
  if(!arr||!arr.length)return;
  arr.forEach(function(s){
    var btn=document.createElement('button');btn.className='sug';btn.textContent=s;
    btn.onclick=function(){el('inp').value=s;enviar();};
    b.appendChild(btn);
  });
}

var S0=['Fui demitido — quais sao todos os meus direitos?','Justa causa pode ser contestada?','Produto com defeito — quais caminhos tenho?','Como cobrar horas extras nao pagas?'];
var S1=['FGTS nao depositado — como cobrar?','Rescisao indireta como funciona?','Cargo de confianca tem direito a hora extra?'];
var S2=['Plano negou procedimento — o que fazer?','Cobranca indevida — tenho direito ao dobro?','Clausulas abusivas no contrato — sao validas?'];
var S3=['Pensao alimenticia em atraso — posso prender?','Guarda compartilhada pode ser contestada?','Como provar alienacao parental?'];

function getSugs(q){
  if(!q)return S0;
  var l=q.toLowerCase();
  if(/trabalho|emprego|salario|clt|demitido|fgts|rescisao/.test(l))return S1;
  if(/consumid|produto|plano|cartao|defeito/.test(l))return S2;
  if(/familia|divorcio|pensao|guarda|filho|alimento/.test(l))return S3;
  return S0.slice(0,3);
}

function writer(el,txt,done){
  var rendered=md(txt);
  var hd='<div class="lex-hd"><span class="lex-hd-ico">&#9878;&#65039;</span><span class="lex-hd-name">Lex Mitio</span></div>';
  var ft='<div class="msg-time">'+agora()+'</div>';
  if(rendered.length>1200){
    el.innerHTML=hd+rendered+ft;
    document.getElementById('chat').scrollTop=9999;
    if(done)done();return;
  }
  var plain=rendered.replace(/<[^>]+>/g,'').replace(/&[a-z]+;/g,' ').replace(/&#\d+;/g,'');
  el.innerHTML=hd+'<span id="twc"></span>'+ft;
  var tw=document.getElementById('twc'),i=0;
  var ch=document.getElementById('chat');
  var spd=plain.length>600?5:9;
  function step(){
    if(i<plain.length){tw.textContent+=plain[i++];ch.scrollTop=9999;setTimeout(step,spd);}
    else{el.innerHTML=hd+rendered+ft;ch.scrollTop=9999;if(done)done();}
  }
  step();
}

function consultar(q,cb){
  var msgs=[
    {role:'user',parts:[{text:SYS}]},
    {role:'model',parts:[{text:'Entendido. Sou Lex Mitio. O veredicto esta em formacao.'}]}
  ];
  hist.forEach(function(m){msgs.push(m);});

  function try_(i){
    if(i>=_m.length){cb({quota:true},null);return;}
    var url=_u+_m[i]+':generateContent?key='+_e;
    var xhr=new XMLHttpRequest();
    xhr.open('POST',url,true);
    xhr.setRequestHeader('Content-Type','application/json');
    xhr.timeout=32000;
    xhr.onreadystatechange=function(){
      if(xhr.readyState!==4)return;
      if(xhr.status===200){
        try{
          var d=JSON.parse(xhr.responseText);
          var t=d.candidates[0].content.parts[0].text;
          setStatus(true,'Online');
          cb(null,t);
        }catch(e){try_(i+1);}
      }else if(xhr.status===429){
        setTimeout(function(){try_(i+1);},1000);
      }else{
        setTimeout(function(){try_(i+1);},600);
      }
    };
    xhr.ontimeout=function(){try_(i+1);};
    xhr.onerror=function(){cb(new Error('network'),null);};
    xhr.send(JSON.stringify({
      contents:msgs,
      generationConfig:{
        temperature:0.78,
        maxOutputTokens:3000,
        topP:0.93,
        topK:40
      },
      safetySettings:[
        {category:'HARM_CATEGORY_HARASSMENT',threshold:'BLOCK_NONE'},
        {category:'HARM_CATEGORY_HATE_SPEECH',threshold:'BLOCK_NONE'},
        {category:'HARM_CATEGORY_SEXUALLY_EXPLICIT',threshold:'BLOCK_NONE'},
        {category:'HARM_CATEGORY_DANGEROUS_CONTENT',threshold:'BLOCK_NONE'}
      ]
    }));
  }
  try_(0);
}

function enviar(){
  var inp=el('inp'),txt=inp.value.trim();
  if(!txt||busy)return;
  inp.value='';inp.style.height='auto';
  busy=true;el('send').disabled=true;setSugs([]);
  addMsg('user',txt,false);
  showTyp();

  consultar(txt,function(err,resp){
    hideTyp();
    if(err){
      var loc=respostaLocal(txt);
      if(loc){
        setStatus(false,'Local');
        var d=document.createElement('div');d.className='msg lex';
        el('chat').appendChild(d);
        writer(d,loc,function(){
          busy=false;el('send').disabled=false;setSugs(getSugs(txt));
          hist.push({role:'model',parts:[{text:loc}]});
        });
      }else{
        setStatus(false,'Local');
        addMsg('lex','**Conexao temporariamente indisponivel.**\n\nDescreva os detalhes do seu caso — responderei com a legislacao local.\nTente novamente em instantes para uma analise mais completa.',false);
        busy=false;el('send').disabled=false;setSugs(S0);
      }
    }else{
      var d=document.createElement('div');d.className='msg lex';
      el('chat').appendChild(d);
      writer(d,resp,function(){
        busy=false;el('send').disabled=false;setSugs(getSugs(txt));
        hist.push({role:'model',parts:[{text:resp}]});
      });
    }
  });
}

  el('splash').classList.add('hide');

window.addEventListener('DOMContentLoaded',function(){
  setTimeout(function(){el('spBtn').classList.add('show');},3000);
  var inp=el('inp');
  inp.addEventListener('input',function(){this.style.height='auto';this.style.height=Math.min(this.scrollHeight,120)+'px';});
  inp.addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();enviar();}});
});

if('serviceWorker' in navigator){
  window.addEventListener('load',function(){
    navigator.serviceWorker.register('sw.js').catch(function(){});
  });
}

window.entrarApp=entrarApp;
window.enviar=enviar;
})();
