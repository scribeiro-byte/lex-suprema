<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0a0a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Lex Mitio">
<meta name="description" content="Lex Mitio — Assistente Juridico gratuito para trabalhadores e cidadaos brasileiros">

<style>
:root{
  --bg:#07070d;
  --surface:#0f0f1a;
  --surface2:#141425;
  --border:#1e1e3a;
  --gold:#c9a84c;
  --gold2:#e8c97a;
  --gold3:#f5dfa0;
  --accent:#4a6fa5;
  --text:#e8e8f0;
  --text2:#9090b0;
  --danger:#e05555;
  --success:#4caf50;
  --radius:14px;
  --shadow:0 4px 24px rgba(0,0,0,0.5);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,-apple-system,sans-serif}

/* SPLASH */
#splash{
  position:fixed;inset:0;z-index:9999;
  background:radial-gradient(ellipse at center,#0d0d20 0%,#07070d 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;
  transition:opacity .6s ease,visibility .6s ease;
}
#splash.hide{opacity:0;visibility:hidden;pointer-events:none}
.sp-icon{font-size:72px;animation:pulse-icon 2s ease-in-out infinite}
@keyframes pulse-icon{0%,100%{transform:scale(1);filter:drop-shadow(0 0 8px rgba(201,168,76,.3))}50%{transform:scale(1.08);filter:drop-shadow(0 0 20px rgba(201,168,76,.8))}}
.sp-title{font-size:36px;font-weight:900;letter-spacing:4px;color:var(--gold);text-transform:uppercase}
.sp-sub{font-size:13px;color:var(--text2);letter-spacing:2px;text-transform:uppercase}
.sp-bar{width:200px;height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.sp-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));animation:bar-fill 2.5s ease-out forwards}
@keyframes bar-fill{from{width:0}to{width:100%}}
.sp-btn{
  margin-top:10px;padding:14px 48px;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:#07070d;border:none;border-radius:30px;cursor:pointer;
  font-size:16px;font-weight:800;letter-spacing:1px;
  box-shadow:0 4px 20px rgba(201,168,76,.4);
  transition:transform .2s,box-shadow .2s;
  display:none;
}
.sp-btn:hover{transform:translateY(-2px);box-shadow:0 6px 28px rgba(201,168,76,.6)}
.sp-btn.show{display:block;animation:fadeInUp .5s ease}
@keyframes fadeInUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* APP */
#app{
  display:none;flex-direction:column;height:100%;
  background:var(--bg);
}
#app.show{display:flex}

/* TOPBAR */
.topbar{
  display:flex;align-items:center;gap:12px;padding:14px 18px;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  box-shadow:0 2px 12px rgba(0,0,0,.3);
  position:relative;z-index:10;
  flex-shrink:0;
}
.lx-icon{font-size:28px;filter:drop-shadow(0 0 6px rgba(201,168,76,.5))}
.brand-info{flex:1}
.top-brand{font-size:18px;font-weight:800;color:var(--gold);letter-spacing:2px}
.top-brand small{font-size:11px;color:var(--gold2);display:block;letter-spacing:1px;margin-top:1px;opacity:.8}
.status-dot{
  width:9px;height:9px;border-radius:50%;
  background:var(--gold);
  box-shadow:0 0 6px var(--gold);
  animation:blink 2s ease-in-out infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
.status-dot.offline{background:#666;box-shadow:none;animation:none}

/* ÁREA CHAT */
#chat{
  flex:1;overflow-y:auto;padding:16px 14px;
  display:flex;flex-direction:column;gap:14px;
  scroll-behavior:smooth;
}
#chat::-webkit-scrollbar{width:4px}
#chat::-webkit-scrollbar-track{background:transparent}
#chat::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* MENSAGENS */
.msg{
  max-width:88%;padding:12px 16px;border-radius:var(--radius);
  line-height:1.6;font-size:14.5px;
  animation:msg-in .3s ease;
}
@keyframes msg-in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.user{
  align-self:flex-end;
  background:linear-gradient(135deg,#1a1a35,#1e1e40);
  border:1px solid #2a2a55;
  color:var(--text);
  border-bottom-right-radius:4px;
}
.msg.bot{
  align-self:flex-start;
  background:var(--surface2);
  border:1px solid var(--border);
  color:var(--text);
  border-bottom-left-radius:4px;
}
.msg.bot.error{border-color:var(--danger);background:#1a0a0a}
.msg-meta{font-size:11px;color:var(--text2);margin-top:6px;display:flex;align-items:center;gap:4px}
.msg h2{font-size:15px;color:var(--gold2);margin:8px 0 4px;border-bottom:1px solid var(--border);padding-bottom:4px}
.msg h3{font-size:14px;color:var(--gold3);margin:6px 0 3px}
.msg ul{padding-left:18px;margin:6px 0}
.msg li{margin:3px 0}
.msg strong{color:var(--gold2)}
.msg code{background:#1a1a2e;padding:2px 6px;border-radius:4px;font-family:monospace;font-size:13px}
.msg a{color:var(--gold2);text-decoration:none}
.msg a:hover{text-decoration:underline}

/* BADGE DO BOT */
.bot-badge{
  display:inline-flex;align-items:center;gap:6px;
  font-size:11px;font-weight:700;color:var(--gold);
  letter-spacing:1px;margin-bottom:6px;
}
.bot-badge::before{content:'⚖';font-size:13px}

/* TYPING */
.typing-indicator{
  display:flex;align-items:center;gap:5px;
  padding:12px 16px;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--radius);border-bottom-left-radius:4px;
  max-width:80px;align-self:flex-start;
  animation:msg-in .3s ease;
}
.typing-indicator span{
  width:7px;height:7px;border-radius:50%;background:var(--gold);
  animation:typing-dot 1.4s infinite;
}
.typing-indicator span:nth-child(2){animation-delay:.2s}
.typing-indicator span:nth-child(3){animation-delay:.4s}
@keyframes typing-dot{0%,80%,100%{transform:scale(.8);opacity:.4}40%{transform:scale(1.2);opacity:1}}

/* SUGESTÕES */
.suggestions{
  display:flex;flex-wrap:wrap;gap:8px;padding:8px 14px 0;
  flex-shrink:0;
}
.sug-btn{
  padding:7px 14px;border-radius:20px;border:1px solid var(--border);
  background:var(--surface);color:var(--text2);cursor:pointer;
  font-size:12.5px;transition:all .2s;white-space:nowrap;
}
.sug-btn:hover{border-color:var(--gold);color:var(--gold);background:rgba(201,168,76,.08)}

/* INPUT AREA */
.input-area{
  display:flex;align-items:flex-end;gap:10px;
  padding:12px 14px 14px;
  background:var(--surface);
  border-top:1px solid var(--border);
  flex-shrink:0;
}
#userInput{
  flex:1;padding:11px 16px;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:22px;color:var(--text);
  font-size:14.5px;resize:none;max-height:120px;
  font-family:inherit;line-height:1.5;
  transition:border-color .2s;
  outline:none;
}
#userInput:focus{border-color:var(--gold)}
#userInput::placeholder{color:var(--text2)}
#sendBtn{
  width:44px;height:44px;border-radius:50%;border:none;cursor:pointer;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:#07070d;font-size:18px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:transform .2s,opacity .2s;
  box-shadow:0 2px 10px rgba(201,168,76,.3);
}
#sendBtn:hover{transform:scale(1.1)}
#sendBtn:disabled{opacity:.4;transform:none;cursor:default}

/* WELCOME */
.welcome-card{
  align-self:center;text-align:center;
  padding:28px 22px;margin:auto;
  background:var(--surface);border:1px solid var(--border);
  border-radius:20px;max-width:320px;width:100%;
}
.welcome-card .wlc-icon{font-size:52px;margin-bottom:12px;display:block}
.welcome-card h2{color:var(--gold);font-size:20px;margin-bottom:6px;letter-spacing:1px}
.welcome-card p{color:var(--text2);font-size:13px;line-height:1.6}
.areas{
  display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:16px;
}
.area-tag{
  padding:5px 12px;border:1px solid var(--border);border-radius:12px;
  font-size:12px;color:var(--text2);background:var(--surface2);
}

/* TOAST */
.toast{
  position:fixed;bottom:90px;left:50%;transform:translateX(-50%);
  background:var(--surface2);border:1px solid var(--border);
  padding:10px 20px;border-radius:20px;font-size:13px;color:var(--text);
  z-index:1000;animation:toast-in .3s ease;
  pointer-events:none;box-shadow:var(--shadow);
}
@keyframes toast-in{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* MODO OFFLINE */
.offline-banner{
  background:#1a0e00;border-bottom:1px solid #4a3000;
  color:#c8a050;font-size:12px;text-align:center;padding:6px;
  display:none;flex-shrink:0;
}
.offline-banner.show{display:block}

@media(min-width:600px){
  #app{max-width:480px;margin:0 auto;height:100vh;border-left:1px solid var(--border);border-right:1px solid var(--border)}
}
</style>
</head>

function localAnswer(q){
  var ql=q.toLowerCase();
  for(var pattern in LOCAL_BASE){
    var regex=new RegExp('('+pattern+')', 'i');
    if(regex.test(ql)){
      return LOCAL_BASE[pattern](q);
    }
  }
  return null;
}

// ─── UI HELPERS ───────────────────────────────────────────────────────────────
function $(id){return document.getElementById(id)}

function renderMD(txt){
  if(!txt)return '';
  return txt
    .replace(/^## (.+)$/gm,'<h2>$1</h2>')
    .replace(/^### (.+)$/gm,'<h3>$1</h3>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/`(.+?)`/g,'<code>$1</code>')
    .replace(/^- (.+)$/gm,'<li>$1</li>')
    .replace(/(<li>.*<\/li>[
]?)+/g,'<ul>$&</ul>')
    .replace(/^\d+\. (.+)$/gm,'<li>$1</li>')
    .replace(/

/g,'<br><br>')
    .replace(/
/g,'<br>');
}

function addMsg(role, text, isHTML){
  var chat=$('chat');
  var div=document.createElement('div');
  div.className='msg '+role;
  if(role==='bot'){
    var badge='<div class="bot-badge">LEX MITIO</div>';
    div.innerHTML=badge+(isHTML?text:renderMD(text));
  } else {
    div.textContent=text;
  }
  var meta=document.createElement('div');
  meta.className='msg-meta';
  var now=new Date();
  meta.textContent=now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');
  div.appendChild(meta);
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
  chatHistory.push({role:role==='user'?'user':'model', parts:[{text:text}]});
  if(chatHistory.length>20)chatHistory=chatHistory.slice(-20);
  return div;
}

function showTyping(){
  var chat=$('chat');
  var div=document.createElement('div');
  div.className='typing-indicator';
  div.id='typingIndicator';
  div.innerHTML='<span></span><span></span><span></span>';
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
}

function removeTyping(){
  var el=$('typingIndicator');
  if(el)el.remove();
}

function showToast(msg,ms){
  var t=document.createElement('div');
  t.className='toast';
  t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(function(){t.remove()},ms||2500);
}

function setStatus(ok){
  var dot=$('statusDot');
  geminiOK=ok;
  if(ok){
    dot.className='status-dot';
    dot.title='Gemini ativo';
    $('offlineBanner').className='offline-banner';
  } else {
    dot.className='status-dot offline';
    dot.title='Modo offline';
    $('offlineBanner').className='offline-banner show';
  }
}

function setSuggestions(list){
  var bar=$('suggestionsBar');
  bar.innerHTML='';
  if(!list||!list.length)return;
  list.forEach(function(s){
    var btn=document.createElement('button');
    btn.className='sug-btn';
    btn.textContent=s;
    btn.onclick=function(){
      $('userInput').value=s;
      sendMsg();
    };
    bar.appendChild(btn);
  });
}

function getSuggestions(topic){
  var all=[
    'Fui demitido sem justa causa, quais meus direitos?',
    'Como pedir aposentadoria no INSS?',
    'Produto com defeito, como resolver?',
    'Recebi cobranca indevida no cartao',
    'Acidente de trabalho, o que fazer?',
    'Pensao alimenticia, como calcular?',
    'Meu chefe nao paga horas extras',
    'Divida prescrita, ainda posso ser cobrado?',
    'Contrato de aluguel, direitos do inquilino',
    'Medida protetiva, como solicitar?',
    'Fui negativado indevidamente',
    'Justa causa contestar como?'
  ];
  if(topic){
    var lower=topic.toLowerCase();
    if(lower.match(/trabalho|clt|emprego|salario/))
      return all.slice(0,4);
    if(lower.match(/inss|aposent|beneficio|previd/))
      return all.slice(0,2).concat(all.slice(5,7));
    if(lower.match(/consumid|produto|plano/))
      return all.slice(2,5);
    if(lower.match(/familia|divorcio|guarda|alimento/))
      return all.slice(5,8);
  }
  return all.slice(0,4);
}

// ─── GEMINI API ────────────────────────────────────────────────────────────────
function askGemini(question, callback){
  var msgs=[{role:'user',parts:[{text:SYS}]},{role:'model',parts:[{text:'Entendido. Sou Lex Mitio, assistente juridico. Estou pronto para ajudar com qualquer questao juridica brasileira.'}]}];
  chatHistory.forEach(function(m){msgs.push(m);});
  
  var xhr=new XMLHttpRequest();
  xhr.open('POST',API_URL,true);
  xhr.setRequestHeader('Content-Type','application/json');
  xhr.timeout=20000;
  
  xhr.onreadystatechange=function(){
    if(xhr.readyState===4){
      if(xhr.status===200){
        try{
          var data=JSON.parse(xhr.responseText);
          var text=data.candidates[0].content.parts[0].text;
          setStatus(true);
          callback(null,text);
        }catch(e){callback(e,null);}
      } else if(xhr.status===429){
        callback({quota:true},null);
      } else {
        callback(new Error('HTTP '+xhr.status),null);
      }
    }
  };
  xhr.ontimeout=function(){callback(new Error('timeout'),null);};
  xhr.onerror=function(){callback(new Error('network'),null);};
  
  xhr.send(JSON.stringify({
    contents:msgs,
    generationConfig:{
      temperature:0.7,
      maxOutputTokens:1200
    },
    safetySettings:[
      {category:'HARM_CATEGORY_HARASSMENT',threshold:'BLOCK_NONE'},
      {category:'HARM_CATEGORY_HATE_SPEECH',threshold:'BLOCK_NONE'},
      {category:'HARM_CATEGORY_SEXUALLY_EXPLICIT',threshold:'BLOCK_NONE'},
      {category:'HARM_CATEGORY_DANGEROUS_CONTENT',threshold:'BLOCK_NONE'}
    ]
  }));
}

// ─── TYPEWRITER ────────────────────────────────────────────────────────────────
function typewriter(el, text, isHTML, done){
  var rendered=isHTML?text:renderMD(text);
  var badge='<div class="bot-badge">LEX MITIO</div>';
  var meta='<div class="msg-meta">'+new Date().getHours().toString().padStart(2,'0')+':'+new Date().getMinutes().toString().padStart(2,'0')+'</div>';
  
  // Para textos longos, mostrar direto
  if(rendered.length>800){
    el.innerHTML=badge+rendered+meta;
    $('chat').scrollTop=$('chat').scrollHeight;
    if(done)done();
    return;
  }
  
  // Typewriter char por char
  el.innerHTML=badge+'<span id="tw"></span>'+meta;
  var tw=$('tw');
  var plain=rendered.replace(/<[^>]+>/g,'');
  var i=0;
  function step(){
    if(i<plain.length){
      tw.textContent+=plain[i];
      i++;
      $('chat').scrollTop=$('chat').scrollHeight;
      setTimeout(step, plain.length>400?8:12);
    } else {
      el.innerHTML=badge+rendered+meta;
      $('chat').scrollTop=$('chat').scrollHeight;
      if(done)done();
    }
  }
  step();
}

// ─── ENVIO DE MENSAGEM ─────────────────────────────────────────────────────────
function sendMsg(){
  var input=$('userInput');
  var text=input.value.trim();
  if(!text||isTyping)return;
  
  input.value='';
  input.style.height='auto';
  isTyping=true;
  $('sendBtn').disabled=true;
  setSuggestions([]);
  
  addMsg('user',text,false);
  showTyping();
  
  askGemini(text,function(err,response){
    removeTyping();
    
    if(err){
      // Tentar base local
      var local=localAnswer(text);
      if(local){
        setStatus(false);
        var div=document.createElement('div');
        div.className='msg bot';
        $('chat').appendChild(div);
        typewriter(div,local,false,function(){
          isTyping=false;
          $('sendBtn').disabled=false;
          setSuggestions(getSuggestions(text));
          chatHistory.push({role:'model',parts:[{text:local}]});
        });
      } else {
        setStatus(false);
        var msg;
        if(err.quota){
          msg='⚠️ **Cota Gemini esgotada** (plano gratuito)

Por favor:
1. Acesse [Google AI Studio](https://aistudio.google.com/app/apikey)
2. Crie uma nova chave ou ative o faturamento

**Enquanto isso**, posso ajudar com direito trabalhista, INSS, consumidor, familia, penal e contratos.';
        } else if(err.message==='timeout'||err.message==='network'){
          msg='⚠️ **Sem conexao no momento**

Tente novamente ou pergunte sobre: trabalhista, INSS, consumidor, familia, penal, aluguel.';
        } else {
          msg='⚠️ Ocorreu um erro. Tente novamente em instantes.';
        }
        var div=document.createElement('div');
        div.className='msg bot error';
        addMsg('bot',msg,false);
        isTyping=false;
        $('sendBtn').disabled=false;
        setSuggestions(getSuggestions(null));
      }
    } else {
      var div=document.createElement('div');
      div.className='msg bot';
      $('chat').appendChild(div);
      typewriter(div,response,false,function(){
        isTyping=false;
        $('sendBtn').disabled=false;
        setSuggestions(getSuggestions(text));
        chatHistory.push({role:'model',parts:[{text:response}]});
      });
    }
  });
}
